name: CI
on:
  pull_request:
    branches:
      - "*"
    paths-ignore:
      - "docs/**"

permissions:
  contents: read

concurrency:
  # For PRs, later CI runs preempt previous ones. e.g. a force push on a PR
  # cancels running CI jobs and starts all new ones.
  #
  # For non-PR pushes, concurrency.group needs to be unique for every distinct
  # CI run we want to have happen. Use run_id, which in practice means all
  # non-PR CI runs will be allowed to run without preempting each other.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        go-version: ["1.26.2"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install dependencies
        run: go mod download

      - name: Install dependencies for mkcert
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3-tools

      - name: Install mkcert
        run: |
          go install filippo.io/mkcert@v1.4.4
          # Add mkcert to the PATH if not already there
          echo "PATH=$(go env GOPATH)/bin:$PATH" >> $GITHUB_ENV
          mkcert -install

      - name: Unit and Integration test
        run: |
          export OPENRUN_HOME=`pwd`
          rm -rf internal/server/appspecs && cd internal/server
          git clone --single-branch --depth 1 https://github.com/openrundev/appspecs.git
          rm -rf appspecs/.git
          cd $OPENRUN_HOME

          go install github.com/commander-cli/commander/v2/cmd/commander@v2.5.0
          export CL_CONTAINER_COMMANDS=disable # pull requests uses github runner, docker/podman does not run
          gmake covtest

      - name: Upload Go test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Go-results-${{ matrix.go-version }}
          path: TestResults-${{ matrix.go-version }}.json
