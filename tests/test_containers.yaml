config:
  env:
    CL_CONFIG_FILE: openrun.toml
    HTTP_PORT: ${HTTP_PORT}
    GOCOVERDIR: ${GOCOVERDIR}/../client
tests:
  # container and proxy plugins are assumed to be enabled in default toml config. So approval is not required for these apps
  container0010: # setup flask app
    command: rm -rf ./flaskapp && mkdir flaskapp && cp flask.py flaskapp/app.py
  container0020: # setup flask dev app
    command: ../openrun app create --dev --spec python-flask --copt kubernetes.invalid=abc --copt docker.cpus=2 --copt command.memory=1g --copt hostname=flaskapp ./flaskapp /cont_flaskdev
  container0030: # setup flask prod app
    command: ../openrun app create --stage-at path --spec python-flask --carg PYTHON_VERSION='{{secret_from "env" "PYTHON_VERSION"}}' --copt cpu-shares=1000 ./flaskapp /cont_flaskprod
  container0031: # invalid python version carg fails
    command: ../openrun app create --spec python-flask --cvol /tmp:/atmp --cvol /testvol --container-arg PYTHON_VERSION=4invalid-slim ./flaskapp /cont_flaskdev2
  container0032: # check curl
    command: curl -sS localhost:${HTTP_PORT}/cont_flaskdev2
    stdout: 4invalid
  container0033: # invalid container run option fails
    command: ../openrun app create --spec python-flask --container-option command.invalid=abc ./flaskapp /cont_flaskdev3
  container0034: # check curl
    command: curl -sS localhost:${HTTP_PORT}/cont_flaskdev3
    stdout: invalid
  container0035: # mount outside of allowed path
    command: ../openrun app create --spec python-flask --cvol /tmp2:/atmp ./flaskapp /cont_flaskdev4
  container0036: # mount fails
    command: curl -sS localhost:${HTTP_PORT}/cont_flaskdev4
    stdout: bind volume source /tmp2 is not allowed
  container0040: # check curl dev works
    command: curl -sS localhost:${HTTP_PORT}/cont_flaskdev
    stdout: "hello"
  container0041: # setup forward auth protected app
    command: ../openrun app create --auth=system+forward_testauth --spec python-flask ./flaskapp /forwardtarget
  container0042: # forward auth allows /allow
    command: curl -sS -u admin:abcd -w ' status=%{http_code}' localhost:${HTTP_PORT}/forwardtarget/allow
    stdout: "forward auth allowed status=200"
  container0043: # forward auth denies /disallow
    command: curl -sS -u admin:abcd -w ' status=%{http_code}' localhost:${HTTP_PORT}/forwardtarget/disallow
    stdout: "forward auth denied status=403"
  container0050: # update app code
    command: perl -i -pe 's/"hello"/"updated"/g' flaskapp/app.py
  container0060: # check dev picked up change
    command: curl -sS localhost:${HTTP_PORT}/cont_flaskdev
    stdout: "updated"
  container0070: # stage is not yet updated
    command: curl -sS localhost:${HTTP_PORT}/cont_flaskprod_cl_stage
    stdout: "hello"
  container0080: # do reload
    command: ../openrun app reload /cont_flaskprod
  container0090: # stage is updated
    command: curl -sS localhost:${HTTP_PORT}/cont_flaskprod_cl_stage
    stdout: "updated"
  container0100: # prod is not yet updated
    command: curl -sS localhost:${HTTP_PORT}/cont_flaskprod
    stdout: "hello"
  container0110: # do promote
    command: ../openrun app promote /cont_flaskprod
  container0120: # prod is updated
    command: curl -sS localhost:${HTTP_PORT}/cont_flaskprod
    stdout: "updated"

  # Test reload verification for container apps
  container0130: # setup verification app sources
    command: rm -rf ./flaskverify_ok ./flaskverify_fail && cp -r ./flaskapp ./flaskverify_ok && cp -r ./flaskapp ./flaskverify_fail
  container0131: # create app which will pass verification
    command: ../openrun app create --stage-at path --spec python-flask ./flaskverify_ok /cont_verify_ok
  container0132: # create app which will fail verification
    command: ../openrun app create --stage-at path --spec python-flask ./flaskverify_fail /cont_verify_fail
  container0133: # update passing app source
    command: perl -i -pe 's/"updated"/"verify-ok"/g' flaskverify_ok/app.py
  container0134: # break failing app source
    command: printf '\nthis is invalid python\n' >> flaskverify_fail/app.py
  container0134a: # dry-run verify does not run container verification
    command: ../openrun app reload --verify --promote --dry-run "/cont_verify_*"
    stdout: "4 app(s) reloaded, 0 app(s) skipped, 0 app(s) approved, 2 app(s) promoted."
  container0135: # verify reload reports failure and skips all promotion
    command: bash -o pipefail -c '../openrun app reload --verify --promote "/cont_verify_*" 2>&1 | tee cont_verify_reload.log'
    stdout: "verify failed for app /cont_verify_fail_cl_stage:"
    exit-code: 1
  container0136: # failed app is reported
    command: 'grep "verify failed for app /cont_verify_fail_cl_stage:" cont_verify_reload.log'
  container0137: # failure reports rollback
    command: 'grep "All changes have been reverted" cont_verify_reload.log'
  container0138: # passing app prod is not promoted because another app failed verification
    command: curl -sS localhost:${HTTP_PORT}/cont_verify_ok
    stdout: "updated"
  container0139: # passing app stage is reverted because another app failed verification
    command: curl -sS localhost:${HTTP_PORT}/cont_verify_ok_cl_stage
    stdout: "updated"
  container0140: # failing app prod is not promoted
    command: curl -sS localhost:${HTTP_PORT}/cont_verify_fail
    stdout: "updated"
  container0141: # successful verify reload promotes prod
    command: ../openrun app reload --verify --promote --force-reload /cont_verify_ok
    stdout: "2 app(s) reloaded, 0 app(s) skipped, 0 app(s) approved, 1 app(s) promoted."
  container0142: # prod is updated after successful verification
    command: curl -sS localhost:${HTTP_PORT}/cont_verify_ok
    stdout: "verify-ok"

  container0200: # setup streamlit app
    command: ../openrun app create --stage-at path --spec python-streamlit --branch master github.com/streamlit/streamlit-example /cont_streamlit
  container0210: # check stage
    command: curl -sS localhost:${HTTP_PORT}/cont_streamlit_cl_stage/_stcore/health
    stdout: ok
  container0220: # check prod
    command: curl -sS localhost:${HTTP_PORT}/cont_streamlit/_stcore/health
    stdout: ok

  container0300: # setup proxy
    command: ../openrun app create --stage-at path --spec proxy --approve --param url=https://www.google.com - /cont_proxy
  container0310: # check stage
    command: curl -sS localhost:${HTTP_PORT}/cont_proxy_cl_stage
    stdout: doctype
  container0320: # check prod
    command: curl -sS localhost:${HTTP_PORT}/cont_proxy
    stdout: doctype

  container0400: # setup nginx image
    command: ../openrun app create --stage-at path --spec image --param image=nginx --param port=80 - /cont_image_nginx
  container0410: # check stage
    command: curl -sS localhost:${HTTP_PORT}/cont_image_nginx_cl_stage
    stdout: Welcome to nginx
  container0420: # check prod
    command: curl -sS localhost:${HTTP_PORT}/cont_image_nginx
    stdout: Welcome to nginx
  container0430: # error check
    command: ../openrun app create --spec image --approve --param image=nginx - /cont_image_error
    stderr: param port is a required param, a value has to be provided
    exit-code: 1

  # Test http plugin call without proxy
  container0500: # setup app
    command: ../openrun app create --spec python-flask --approve --param PASSWD=xyz ./flaskhttp /cont_fh
  container0510: # check curl
    command: curl -sS localhost:${HTTP_PORT}/cont_fh
    stdout: '"v1":"hello"'
  container0520: # check curl
    command: curl -sS localhost:${HTTP_PORT}/cont_fh
    stdout: '"v2":"xyz"'

  # Test go spec
  container0600: # setup app
    command: ../openrun app create --approve --spec go --param port=8080 --param APP_ARGS="-addr 0.0.0.0:8080" --branch master github.com/golang/example/helloserver /cont_goapp
  container0610: # check curl
    command: curl -sS localhost:${HTTP_PORT}/cont_goapp
    stdout: "Hello, Gopher!"

  container_cleanup: # Cleanup generated test sources
    command: rm -rf ./flaskverify_ok ./flaskverify_fail ./cont_verify_reload.log
