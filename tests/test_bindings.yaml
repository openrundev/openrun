config:
  env:
    CL_CONFIG_FILE: openrun.toml
    GOCOVERDIR: ${GOCOVERDIR}/../client
    PATH: ${PATH}
    TEST_POSTGRES_URL: ${TEST_POSTGRES_URL}

tests:
  # Setup: create the source service used by all bindings below
  binding0001:
    command: ../openrun service create --config url=${TEST_POSTGRES_URL} --config binding_hostname=host.docker.internal postgres/testbind
    stdout: "Service postgres/testbind created"
    exit-code: 0

  # Basic create + get
  binding0010: # create simple binding
    command: ../openrun binding create postgres/testbind /apps/b1
    stdout: "Binding /apps/b1 created"
    exit-code: 0

  binding0011: # path returned correctly
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].path'
    stdout: "/apps/b1"

  binding0012: # source stored
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].source'
    stdout: "postgres/testbind"

  binding0013: # service_type resolved from source
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].service_type'
    stdout: "postgres"

  binding0014: # service_name resolved from source
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].service_name'
    stdout: "testbind"

  binding0015: # base_binding empty when source is a service reference
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].base_binding'
    stdout: ""

  binding0016: # create_time populated with year prefix
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].create_time'
    stdout: "20"

  binding0017: # update_time populated with year prefix
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].update_time'
    stdout: "20"

  # Create with config key=value entries
  binding0020:
    command: ../openrun binding create --config inherit_default=false postgres/testbind /apps/b2
    stdout: "Binding /apps/b2 created"

  binding0021: # config inherit_default stored in metadata
    command: ../openrun binding get -f json /apps/b2 | jq -r '.[0].metadata.config.inherit_default'
    stdout: "false"

  binding0022: # config inherit_default stored in staged metadata
    command: ../openrun binding get -f json /apps/b2 | jq -r '.[0].staged_metadata.config.inherit_default'
    stdout: "false"

  binding0023: # metadata has exactly 1 key
    command: ../openrun binding get -f json /apps/b2 | jq '.[0].metadata.config | length'
    stdout: "1"

  # Create with --config
  binding0030:
    command: ../openrun binding create --config inherit_default=true postgres/testbind /apps/b3
    stdout: "Binding /apps/b3 created"

  binding0031: # string from config
    command: ../openrun binding get -f json /apps/b3 | jq -r '.[0].metadata.config.inherit_default'
    stdout: "true"

  binding0032: # metadata has exactly 1 key
    command: ../openrun binding get -f json /apps/b3 | jq '.[0].metadata.config | length'
    stdout: "1"

  binding0033: # account info is not included in binding get
    command: ../openrun binding get -f json /apps/b3 | jq -r '.[0].metadata | has("account")'
    stdout: "false"

  binding0034: # staged account info is not included in binding get
    command: ../openrun binding get -f json /apps/b3 | jq -r '.[0].staged_metadata | has("account")'
    stdout: "false"

  binding0035: # account url is available through show-account
    command: ../openrun binding show-account /apps/b3 | jq -r '.url | startswith("postgres://")'
    stdout: "true"

  binding0036: # staged account url is available through show-account --staging
    command: ../openrun binding show-account --staging /apps/b3 | jq -r '.url | startswith("postgres://")'
    stdout: "true"

  binding0037: # binding account url uses service binding_hostname
    command: ../openrun binding show-account /apps/b3 | jq -r '.url_binding | startswith("postgres://") and contains("@host.docker.internal")'
    stdout: "true"

  binding0038: # direct account url keeps the service hostname
    command: ../openrun binding show-account /apps/b3 | jq -r '.url != .url_binding'
    stdout: "true"

  # Later --config entries override earlier entries
  binding0040:
    command: ../openrun binding create --config inherit_default=true --config inherit_default=false postgres/testbind /apps/b4
    stdout: "Binding /apps/b4 created"

  binding0041: # later config overrode earlier inherit_default
    command: ../openrun binding get -f json /apps/b4 | jq -r '.[0].metadata.config.inherit_default'
    stdout: "false"

  binding0042: # staged metadata matches metadata
    command: ../openrun binding get -f json /apps/b4 | jq -r '.[0].staged_metadata.config.inherit_default'
    stdout: "false"

  binding0043: # one config key present
    command: ../openrun binding get -f json /apps/b4 | jq '.[0].metadata.config | length'
    stdout: "1"

  # Source = "<service_type>" alone resolves to the default service of that type
  binding0045:
    command: ../openrun binding create postgres /apps/b5
    stdout: "Binding /apps/b5 created"

  binding0046: # source string preserved as user provided it
    command: ../openrun binding get -f json /apps/b5 | jq -r '.[0].source'
    stdout: "postgres"

  binding0047: # service_type resolved
    command: ../openrun binding get -f json /apps/b5 | jq -r '.[0].service_type'
    stdout: "postgres"

  binding0048: # service_name resolved to the default postgres service (testbind)
    command: ../openrun binding get -f json /apps/b5 | jq -r '.[0].service_name'
    stdout: "testbind"

  binding0049: # base_binding empty since source resolves to a service
    command: ../openrun binding get -f json /apps/b5 | jq -r '.[0].base_binding'
    stdout: ""

  # List + filter by source
  binding0050: # 5 bindings created so far
    command: ../openrun binding list -f json | jq 'length'
    stdout: "5"

  binding0051: # source filter for postgres/testbind returns 4 entries (b1..b4)
    command: ../openrun binding list -f json --source postgres/testbind | jq 'length'
    stdout: "4"

  binding0052: # filter for unknown source returns empty list
    command: ../openrun binding list -f json --source nope/missing | jq 'length'
    stdout: "0"

  binding0053: # bindings sorted by path
    command: ../openrun binding list -f json | jq -r '[.[].path] | join(",")'
    stdout: "/apps/b1,/apps/b2,/apps/b3,/apps/b4,/apps/b5"

  binding0054: # distinct sources used across bindings
    command: ../openrun binding list -f json | jq -r '[.[].source] | unique | join(",")'
    stdout: "postgres,postgres/testbind"

  binding0055: # all bindings resolve to the same service_type/service_name
    command: ../openrun binding list -f json | jq -r '[.[] | .service_type + "/" + .service_name] | unique | join(",")'
    stdout: "postgres/testbind"

  binding0056: # account info is not included in binding list
    command: ../openrun binding list -f json | jq -r '.[] | select(.path == "/apps/b3") | .metadata | has("account")'
    stdout: "false"

  binding0057: # staged account info is not included in binding list
    command: ../openrun binding list -f json | jq -r '.[] | select(.path == "/apps/b3") | .staged_metadata | has("account")'
    stdout: "false"

  # Update: grants on derived bindings
  binding0060:
    command: ../openrun binding create --grant "read:*" /apps/b1 /apps/b6
    stdout: "Binding /apps/b6 created"

  binding0061: # derived binding source is the base binding path
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].source'
    stdout: "/apps/b1"

  binding0062: # initial grant is stored in active metadata
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].metadata.grants | join(",")'
    stdout: "read:*"

  binding0063: # initial grant is stored in staged metadata
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "read:*"

  binding0064: # add a grant
    command: ../openrun binding update --add-grant "create:*" /apps/b6
    stdout: "Binding /apps/b6 updated"

  binding0065: # active metadata is unchanged until promote
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].metadata.grants | join(",")'
    stdout: "read:*"

  binding0066: # staged metadata is updated immediately
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "read:*,create:*"

  binding0067: # duplicate add is ignored even with casing/spacing differences
    command: '../openrun binding update --add-grant " CREATE : * " /apps/b6'
    stdout: "Binding /apps/b6 updated"

  binding0068:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "read:*,create:*"

  binding0070: # delete a grant even with casing/spacing differences
    command: '../openrun binding update --delete-grant " READ : * " /apps/b6'
    stdout: "Binding /apps/b6 updated"

  binding0071:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].metadata.grants | join(",")'
    stdout: "read:*"

  binding0072:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "create:*"

  binding0080: # add and delete can be combined
    command: ../openrun binding update --add-grant "full:*" --delete-grant "create:*" /apps/b6
    stdout: "Binding /apps/b6 updated"

  binding0081:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].metadata.grants | join(",")'
    stdout: "read:*"

  binding0082:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "full:*"

  binding0090: # base bindings cannot have grant updates
    command: ../openrun binding update --add-grant "read:*" /apps/b1
    exit-code: 1
    stderr: "grants are not supported for base bindings"

  binding0091: # promote copies staged grants to active metadata
    command: ../openrun binding update --promote /apps/b6
    stdout: "Binding /apps/b6 updated"

  binding0092:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].metadata.grants | join(",")'
    stdout: "full:*"

  binding0093:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "full:*"

  binding0094: # no-op update without grant flags, promote, or reapply-all is rejected client-side
    command: ../openrun binding update /apps/b6
    exit-code: 1
    stderr: "expected at least one --add-grant, --delete-grant, --promote, or --reapply-all"

  binding0095: # grants_applied tracks the active full grant
    command: ../openrun binding get -f json /apps/b6 | jq '.[0].metadata.grants_applied | length'
    stdout: "1"

  binding0096: # grants_applied has canonical grant type
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].metadata.grants_applied[0].grant_type'
    stdout: "FULL"

  binding0097: # reapply-all is accepted as an update operation
    command: ../openrun binding update --reapply-all /apps/b6
    stdout: "Binding /apps/b6 updated"

  # Table format includes path/source columns
  binding0100:
    command: ../openrun binding list | head -n 1
    stdout: "Path"

  binding0101: # data row contains path
    command: ../openrun binding list | grep "/apps/b1" | awk '{print $1}'
    stdout: "/apps/b1"

  binding0102: # data row source for /apps/b1
    command: ../openrun binding list | grep "/apps/b1" | awk '{print $2}'
    stdout: "postgres/testbind"

  # basic format
  binding0110:
    command: ../openrun binding list -f basic | head -n 1
    stdout: "Path"

  binding0111:
    command: ../openrun binding list -f basic | grep "/apps/b1" | awk '{print $2}'
    stdout: "postgres/testbind"

  # csv format
  binding0120: # csv contains path,source comma-separated
    command: ../openrun binding list -f csv | grep ",/apps/b1," | cut -d, -f2-3
    stdout: "/apps/b1,postgres/testbind"

  # jsonl format - one json object per line
  binding0130:
    command: ../openrun binding list -f jsonl | wc -l | tr -d ' '
    stdout: "6"

  # App binding source permission approval flow
  binding0140: # create app used for binding source permission approval checks
    command: ../openrun app create ./testapp /apps/bindperm
    stdout: "App created. No approval required"

  binding0141: # non-default binding source permission is staged
    command: ../openrun app update bind-perm external/private /apps/bindperm
    stdout: "1 app(s) updated, 0 app(s) promoted."

  binding0142: # staged metadata has requested binding source permission
    command: ../openrun app list -i -f json /apps/bindperm | jq -r 'map(select(.path == "/apps/bindperm_cl_stage"))[0].metadata.binding_source_perms | join(",")'
    stdout: "external/private"

  binding0143: # staged metadata does not have the non-default source approved yet
    command: ../openrun app list -i -f json /apps/bindperm | jq 'map(select(.path == "/apps/bindperm_cl_stage"))[0].metadata.approved_binding_source_perms | length'
    stdout: "0"

  binding0144: # dry-run approve reports the binding source but does not persist approval
    command: ../openrun app approve --dry-run /apps/bindperm
    stdout: "Binding Sources:"

  binding0145: # dry-run approve did not update approved binding source permissions
    command: ../openrun app list -i -f json /apps/bindperm | jq 'map(select(.path == "/apps/bindperm_cl_stage"))[0].metadata.approved_binding_source_perms | length'
    stdout: "0"

  binding0146: # approve copies requested binding sources to approved list and promotes
    command: '../openrun app approve --promote /apps/bindperm | sed "s/app_stg_.*/YYY/g"'
    stdout:
      exactly: "App permissions have been approved /apps/bindperm_cl_stage - YYY\n  Plugins :\n  Binding Sources:\n    external/private\n  Permissions:\nPromoted apps: /apps/bindperm\n1 app(s) audited, 1 app(s) approved, 1 app(s) promoted.\n"

  binding0147: # approved binding source no longer requires approval
    command: ../openrun app approve --dry-run /apps/bindperm
    stdout: "No approval required."

  binding0148: # promoted prod and staged metadata both have the approved binding source
    command: ../openrun app list -i -f json /apps/bindperm | jq -r '[.[].metadata.approved_binding_source_perms | join(",")] | unique | join(";")'
    stdout: "external/private"

  binding0149: # create --bind-perm with --approve stores requested and approved binding source permissions
    command: ../openrun app create --approve --bind-perm external/create ./testapp /apps/bindperm_create
    stdout: "App created. Permissions have been approved"

  binding0149a: # create --bind-perm stores requested binding source permission on prod and stage
    command: ../openrun app list -i -f json /apps/bindperm_create | jq -r '[.[].metadata.binding_source_perms | join(",")] | unique | join(";")'
    stdout: "external/create"

  binding0149b: # --approve copied requested binding source permission into approved list
    command: ../openrun app list -i -f json /apps/bindperm_create | jq -r '[.[].metadata.approved_binding_source_perms | join(",")] | unique | join(";")'
    stdout: "external/create"

  # Dry-run create does not persist
  binding0200:
    command: ../openrun binding create --dry-run postgres/testbind /apps/dry1
    stdout: "Binding /apps/dry1 created"

  binding0201: # dry-run create did not persist (still 6 bindings)
    command: ../openrun binding list -f json | jq 'length'
    stdout: "6"

  # Dry-run update does not persist
  binding0210:
    command: ../openrun binding update --dry-run --add-grant "read:*" /apps/b6
    stdout: "dry-run mode"

  binding0211: # staged grants unchanged after dry-run update
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "full:*"

  # Dry-run delete does not persist
  binding0220:
    command: ../openrun binding delete --dry-run /apps/b1
    stdout: "Binding /apps/b1 deleted"

  binding0221: # dry-run delete did not remove the binding
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].path'
    stdout: "/apps/b1"

  # Error cases
  binding0300: # create requires <source> and <binding_path> args
    command: ../openrun binding create postgres/testbind
    exit-code: 1
    stderr: "expected two args"

  binding0301: # too many args to create
    command: ../openrun binding create postgres/testbind /apps/x extra
    exit-code: 1
    stderr: "expected two args"

  binding0302: # invalid config entry on create
    command: ../openrun binding create --config nope postgres/testbind /apps/b_bad
    exit-code: 1
    stderr: "invalid config entry"

  binding0303: # metadata-json option was removed
    command: ../openrun binding create --metadata-json 'not-json' postgres/testbind /apps/b_bad
    exit-code: 1
    stderr: "flag provided but not defined"

  binding0304: # update requires <path> arg
    command: ../openrun binding update --add-grant "read:*"
    exit-code: 1
    stderr: "expected one arg"

  binding0305: # update non-existent binding
    command: ../openrun binding update --add-grant "read:*" /apps/missing
    exit-code: 1
    stderr: "binding not found with path: /apps/missing"

  binding0306: # config updates are no longer supported
    command: ../openrun binding update --config nope /apps/b1
    exit-code: 1
    stderr: "flag provided but not defined"

  binding0307: # delete non-existent binding
    command: ../openrun binding delete /apps/missing
    exit-code: 1
    stderr: "no binding found with path /apps/missing"

  binding0308: # get non-existent binding
    command: ../openrun binding get /apps/missing
    exit-code: 1
    stderr: "binding not found with path: /apps/missing"

  binding0309: # delete requires <path> arg
    command: ../openrun binding delete
    exit-code: 1
    stderr: "expected one arg"

  binding0310: # get requires <path> arg
    command: ../openrun binding get
    exit-code: 1
    stderr: "expected one arg"

  binding0311: # list does not accept positional args
    command: ../openrun binding list extra
    exit-code: 1
    stderr: "expected no args"

  binding0312: # show-account requires <path> arg
    command: ../openrun binding show-account
    exit-code: 1
    stderr: "expected one arg"

  binding0313: # show-account non-existent binding
    command: ../openrun binding show-account /apps/missing
    exit-code: 1
    stderr: "binding not found with path: /apps/missing"

  binding0314: # source referencing a missing service by type/name fails
    command: ../openrun binding create postgres/missing /apps/b_bad
    exit-code: 1
    stderr: "service postgres/missing not found"

  binding0315: # source referencing a service type with no default fails
    command: ../openrun binding create mysql /apps/b_bad
    exit-code: 1
    stderr: "service mysql not found"

  binding0316: # empty source rejected
    command: ../openrun binding create "" /apps/b_bad
    exit-code: 1
    stderr: "binding source is required"

  binding0317: # creating a binding with an existing path fails
    command: ../openrun binding create postgres /apps/b1
    exit-code: 1
    stderr: "binding already exists: /apps/b1"

  binding0318: # source referencing a missing base binding fails
    command: ../openrun binding create /apps/missing /apps/b_bad
    exit-code: 1
    stderr: "binding source /apps/missing not found"

  binding0319: # /auto is reserved for autobindings
    command: ../openrun binding create postgres/testbind /auto/bad
    exit-code: 1
    stderr: "/auto is reserved for autobindings"

  # Failed creates above must not have persisted
  binding0320:
    command: ../openrun binding list -f json | jq 'length'
    stdout: "6"

  # Delete + list verifies removal
  binding0400:
    command: ../openrun binding delete /apps/b4
    stdout: "Binding /apps/b4 deleted"

  binding0401: # 5 bindings remain
    command: ../openrun binding list -f json | jq 'length'
    stdout: "5"

  binding0402: # /apps/b4 not in list
    command: ../openrun binding list -f json | jq -r '[.[].path] | join(",")'
    stdout: "/apps/b1,/apps/b2,/apps/b3,/apps/b5,/apps/b6"

  binding0403: # second delete of same binding fails
    command: ../openrun binding delete /apps/b4
    exit-code: 1
    stderr: "no binding found with path /apps/b4"

  binding0500: # apply creates base and derived bindings
    command: ../openrun apply ./apply_files/apply_bindings1.ace /apps/apply**
    stdout: "2 binding(s) created, 0 binding(s) updated, 0 binding(s) promoted."

  binding0501: # apply stored base binding config in prod
    command: ../openrun binding get -f json /apps/applybase | jq -r '.[0].metadata.config.inherit_default'
    stdout: "false"

  binding0502: # apply stored base binding config in staging
    command: ../openrun binding get -f json /apps/applybase | jq -r '.[0].staged_metadata.config.inherit_default'
    stdout: "false"

  binding0503: # apply stored derived binding grant in prod
    command: ../openrun binding get -f json /apps/applyread | jq -r '.[0].metadata.grants | join(",")'
    stdout: "read:test_apply1"

  binding0504: # non-declarative staged grant should be preserved by three-way merge
    command: ../openrun binding update --add-grant "create:*" /apps/applyread
    stdout: "Binding /apps/applyread updated"

  binding0510: # apply updates staged metadata using a three-way merge
    command: ../openrun apply --reload=none ./apply_files/apply_bindings2.ace /apps/apply**
    stdout: "0 binding(s) created, 1 binding(s) updated, 0 binding(s) promoted."

  binding0511: # staged base config is unchanged
    command: ../openrun binding get -f json /apps/applybase | jq -r '.[0].staged_metadata.config.inherit_default'
    stdout: "false"

  binding0512: # prod base config is unchanged until promote
    command: ../openrun binding get -f json /apps/applybase | jq -r '.[0].metadata.config.inherit_default'
    stdout: "false"

  binding0513: # staged grants remove old declarative, add new declarative, and keep CLI grant
    command: ../openrun binding get -f json /apps/applyread | jq -r '.[0].staged_metadata.grants | sort | join(",")'
    stdout: "create:*,read:test_apply2"

  binding0514: # prod grants are unchanged until promote
    command: ../openrun binding get -f json /apps/applyread | jq -r '.[0].metadata.grants | join(",")'
    stdout: "read:test_apply1"

  binding0520: # promote copies staged binding metadata to prod
    command: ../openrun apply --promote --reload=none ./apply_files/apply_bindings2.ace /apps/apply**
    stdout: "0 binding(s) created, 0 binding(s) updated, 1 binding(s) promoted."

  binding0521: # prod base config is unchanged
    command: ../openrun binding get -f json /apps/applybase | jq -r '.[0].metadata.config.inherit_default'
    stdout: "false"

  binding0522: # prod derived grants were promoted
    command: ../openrun binding get -f json /apps/applyread | jq -r '.[0].metadata.grants | sort | join(",")'
    stdout: "create:*,read:test_apply2"

  binding0530: # clobber removes non-declarative staged grants
    command: ../openrun apply --clobber --reload=none ./apply_files/apply_bindings2.ace /apps/applyread
    stdout: "0 binding(s) created, 1 binding(s) updated, 0 binding(s) promoted."

  binding0531: # staged grants now exactly match the apply file
    command: ../openrun binding get -f json /apps/applyread | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "read:test_apply2"

  binding0540: # source changes are rejected
    command: ../openrun apply --reload=none ./apply_files/apply_bindings_source_change.ace /apps/applybase
    exit-code: 1
    stderr: "binding /apps/applybase already exists with different source: postgres/testbind"

  binding0541: # config updates are rejected for existing bindings
    command: ../openrun apply --reload=none ./apply_files/apply_bindings_config_update.ace /apps/applybase
    exit-code: 1
    stderr: "binding config updates are not supported for existing binding /apps/applybase"

  binding0542: # binding config values must be strings
    command: ../openrun apply --reload=none ./apply_files/apply_bindings_bad_config.ace /apps/applybadconfig
    exit-code: 1
    stderr: "config value inherit_default is not a string"

  binding0543: # bindings are applied even when the app glob matches no apps
    command: ../openrun apply --reload=none ./apply_files/apply_bindings_glob.ace /does/not/match
    stdout: "1 binding(s) created, 0 binding(s) updated, 0 binding(s) promoted."

  binding0544: # glob-created binding exists
    command: ../openrun binding get -f json /apps/applyglob | jq -r '.[0].path'
    stdout: "/apps/applyglob"

  binding0545: # apply app definition stores bind_perm on create
    command: ../openrun apply --approve --promote --reload=none ./apply_files/apply_bind_perm1.ace /apps/applybindperm
    stdout: "1 app(s) created, 0 app(s) updated, 0 app(s) reloaded, 0 app(s) skipped, 0 app(s) approved, 0 app(s) promoted."

  binding0546: # bind_perm from apply is stored in requested and approved metadata
    command: ../openrun app list -i -f json /apps/applybindperm | jq -r '([.[].metadata.binding_source_perms | join(",")] | unique | join(";")) + "|" + ([.[].metadata.approved_binding_source_perms | join(",")] | unique | join(";"))'
    stdout: "external/apply|external/apply"

  binding0547: # apply updates bind_perm through staged metadata merge
    command: ../openrun apply --approve --reload=none ./apply_files/apply_bind_perm2.ace /apps/applybindperm
    stdout: "0 app(s) created, 1 app(s) updated, 0 app(s) reloaded, 0 app(s) skipped, 1 app(s) approved, 0 app(s) promoted."

  binding0548: # updated bind_perm is staged but prod keeps the old value until promote
    command: ../openrun app list -i -f json /apps/applybindperm | jq -r '(map(select(.path == "/apps/applybindperm_cl_stage"))[0].metadata.binding_source_perms | join(",")) + "|" + (map(select(.path == "/apps/applybindperm"))[0].metadata.binding_source_perms | join(","))'
    stdout: "external/apply2|external/apply"

  binding0550: # setup CLI-created binding for first apply adoption
    command: ../openrun binding create postgres/testbind /apps/applyclibase
    stdout: "Binding /apps/applyclibase created"

  binding0551: # setup CLI-created derived binding with an old grant
    command: ../openrun binding create --grant "read:test_cli_old" /apps/applyclibase /apps/applycliread
    stdout: "Binding /apps/applycliread created"

  binding0552: # first apply with promote reports bindings as both updated and promoted
    command: ../openrun apply --promote --reload=none ./apply_files/apply_bindings_cli_adopt.ace /does/not/match
    stdout: "0 binding(s) created, 2 binding(s) updated, 2 binding(s) promoted."

  binding0553: # old CLI grant was removed on first apply
    command: ../openrun binding get -f json /apps/applycliread | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "read:test_cli_new"

  binding0554: # promoted metadata also has the adopted grant
    command: ../openrun binding get -f json /apps/applycliread | jq -r '.[0].metadata.grants | join(",")'
    stdout: "read:test_cli_new"

  # Cleanup: remove remaining bindings and the source service
  binding99999:
    command: (../openrun app delete /apps/applybindperm; ../openrun app delete /apps/bindperm_create; ../openrun app delete /apps/bindperm; ../openrun binding delete /apps/applycliread; ../openrun binding delete /apps/applyclibase; ../openrun binding delete /apps/applyglob; ../openrun binding delete /apps/applyread; ../openrun binding delete /apps/applybase; ../openrun binding delete /apps/b6; ../openrun binding delete /apps/b1; ../openrun binding delete /apps/b2; ../openrun binding delete /apps/b3; ../openrun binding delete /apps/b5; ../openrun service delete postgres/testbind) || true
