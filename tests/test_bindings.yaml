config:
  env:
    CL_CONFIG_FILE: openrun.toml
    GOCOVERDIR: ${GOCOVERDIR}/../client
    PATH: ${PATH}
    TEST_POSTGRES_URL: ${TEST_POSTGRES_URL}

tests:
  # Setup: create the source service used by all bindings below
  binding0001:
    command: ../openrun service create --config url=${TEST_POSTGRES_URL} postgres/testbind
    stdout: "Service postgres/testbind created"
    exit-code: 0

  # Basic create + get
  binding0010: # create simple binding
    command: ../openrun binding create postgres/testbind /apps/b1
    stdout: "Binding /apps/b1 created"
    exit-code: 0

  binding0011: # path returned correctly
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].path'
    stdout: "/apps/b1"

  binding0012: # source stored
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].source'
    stdout: "postgres/testbind"

  binding0013: # service_type resolved from source
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].service_type'
    stdout: "postgres"

  binding0014: # service_name resolved from source
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].service_name'
    stdout: "testbind"

  binding0015: # base_binding empty when source is a service reference
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].base_binding'
    stdout: ""

  binding0016: # create_time populated with year prefix
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].create_time'
    stdout: "20"

  binding0017: # update_time populated with year prefix
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].update_time'
    stdout: "20"

  # Create with config key=value entries
  binding0020:
    command: ../openrun binding create --config inherit_default=false postgres/testbind /apps/b2
    stdout: "Binding /apps/b2 created"

  binding0021: # config inherit_default stored in metadata
    command: ../openrun binding get -f json /apps/b2 | jq -r '.[0].metadata.config.inherit_default'
    stdout: "false"

  binding0022: # config inherit_default stored in staged metadata
    command: ../openrun binding get -f json /apps/b2 | jq -r '.[0].staged_metadata.config.inherit_default'
    stdout: "false"

  binding0023: # metadata has exactly 1 key
    command: ../openrun binding get -f json /apps/b2 | jq '.[0].metadata.config | length'
    stdout: "1"

  # Create with --config
  binding0030:
    command: ../openrun binding create --config inherit_default=true postgres/testbind /apps/b3
    stdout: "Binding /apps/b3 created"

  binding0031: # string from config
    command: ../openrun binding get -f json /apps/b3 | jq -r '.[0].metadata.config.inherit_default'
    stdout: "true"

  binding0032: # metadata has exactly 1 key
    command: ../openrun binding get -f json /apps/b3 | jq '.[0].metadata.config | length'
    stdout: "1"

  binding0033: # account url was generated
    command: ../openrun binding get -f json /apps/b3 | jq -r '.[0].metadata.account.url | startswith("postgres://")'
    stdout: "true"

  # Later --config entries override earlier entries
  binding0040:
    command: ../openrun binding create --config inherit_default=true --config inherit_default=false postgres/testbind /apps/b4
    stdout: "Binding /apps/b4 created"

  binding0041: # later config overrode earlier inherit_default
    command: ../openrun binding get -f json /apps/b4 | jq -r '.[0].metadata.config.inherit_default'
    stdout: "false"

  binding0042: # staged metadata matches metadata
    command: ../openrun binding get -f json /apps/b4 | jq -r '.[0].staged_metadata.config.inherit_default'
    stdout: "false"

  binding0043: # one config key present
    command: ../openrun binding get -f json /apps/b4 | jq '.[0].metadata.config | length'
    stdout: "1"

  # Source = "<service_type>" alone resolves to the default service of that type
  binding0045:
    command: ../openrun binding create postgres /apps/b5
    stdout: "Binding /apps/b5 created"

  binding0046: # source string preserved as user provided it
    command: ../openrun binding get -f json /apps/b5 | jq -r '.[0].source'
    stdout: "postgres"

  binding0047: # service_type resolved
    command: ../openrun binding get -f json /apps/b5 | jq -r '.[0].service_type'
    stdout: "postgres"

  binding0048: # service_name resolved to the default postgres service (testbind)
    command: ../openrun binding get -f json /apps/b5 | jq -r '.[0].service_name'
    stdout: "testbind"

  binding0049: # base_binding empty since source resolves to a service
    command: ../openrun binding get -f json /apps/b5 | jq -r '.[0].base_binding'
    stdout: ""

  # List + filter by source
  binding0050: # 5 bindings created so far
    command: ../openrun binding list -f json | jq 'length'
    stdout: "5"

  binding0051: # source filter for postgres/testbind returns 4 entries (b1..b4)
    command: ../openrun binding list -f json --source postgres/testbind | jq 'length'
    stdout: "4"

  binding0052: # filter for unknown source returns empty list
    command: ../openrun binding list -f json --source nope/missing | jq 'length'
    stdout: "0"

  binding0053: # bindings sorted by path
    command: ../openrun binding list -f json | jq -r '[.[].path] | join(",")'
    stdout: "/apps/b1,/apps/b2,/apps/b3,/apps/b4,/apps/b5"

  binding0054: # distinct sources used across bindings
    command: ../openrun binding list -f json | jq -r '[.[].source] | unique | join(",")'
    stdout: "postgres,postgres/testbind"

  binding0055: # all bindings resolve to the same service_type/service_name
    command: ../openrun binding list -f json | jq -r '[.[] | .service_type + "/" + .service_name] | unique | join(",")'
    stdout: "postgres/testbind"

  # Update: grants on derived bindings
  binding0060:
    command: ../openrun binding create --grant "read:*" /apps/b1 /apps/b6
    stdout: "Binding /apps/b6 created"

  binding0061: # derived binding source is the base binding path
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].source'
    stdout: "/apps/b1"

  binding0062: # initial grant is stored in active metadata
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].metadata.grants | join(",")'
    stdout: "read:*"

  binding0063: # initial grant is stored in staged metadata
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "read:*"

  binding0064: # add a grant
    command: ../openrun binding update --add-grant "create:*" /apps/b6
    stdout: "Binding /apps/b6 updated"

  binding0065: # active metadata is unchanged until promote
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].metadata.grants | join(",")'
    stdout: "read:*"

  binding0066: # staged metadata is updated immediately
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "read:*,create:*"

  binding0067: # duplicate add is ignored
    command: ../openrun binding update --add-grant "create:*" /apps/b6
    stdout: "Binding /apps/b6 updated"

  binding0068:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "read:*,create:*"

  binding0070: # delete a grant
    command: ../openrun binding update --delete-grant "read:*" /apps/b6
    stdout: "Binding /apps/b6 updated"

  binding0071:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].metadata.grants | join(",")'
    stdout: "read:*"

  binding0072:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "create:*"

  binding0080: # add and delete can be combined
    command: ../openrun binding update --add-grant "full:*" --delete-grant "create:*" /apps/b6
    stdout: "Binding /apps/b6 updated"

  binding0081:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].metadata.grants | join(",")'
    stdout: "read:*"

  binding0082:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "full:*"

  binding0090: # base bindings cannot have grant updates
    command: ../openrun binding update --add-grant "read:*" /apps/b1
    exit-code: 1
    stderr: "grants are not supported for base bindings"

  binding0091: # promote copies staged grants to active metadata
    command: ../openrun binding update --promote /apps/b6
    stdout: "Binding /apps/b6 updated"

  binding0092:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].metadata.grants | join(",")'
    stdout: "full:*"

  binding0093:
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "full:*"

  binding0094: # no-op update without grant flags or promote is rejected client-side
    command: ../openrun binding update /apps/b6
    exit-code: 1
    stderr: "expected at least one --add-grant, --delete-grant, or --promote"

  binding0095: # grants_applied tracks the active full grant
    command: ../openrun binding get -f json /apps/b6 | jq '.[0].metadata.grants_applied | length'
    stdout: "1"

  binding0096: # grants_applied has canonical grant type
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].metadata.grants_applied[0].grant_type'
    stdout: "FULL"

  # Table format includes path/source columns
  binding0100:
    command: ../openrun binding list | head -n 1
    stdout: "Path"

  binding0101: # data row contains path
    command: ../openrun binding list | grep "/apps/b1" | awk '{print $1}'
    stdout: "/apps/b1"

  binding0102: # data row source for /apps/b1
    command: ../openrun binding list | grep "/apps/b1" | awk '{print $2}'
    stdout: "postgres/testbind"

  # basic format
  binding0110:
    command: ../openrun binding list -f basic | head -n 1
    stdout: "Path"

  binding0111:
    command: ../openrun binding list -f basic | grep "/apps/b1" | awk '{print $2}'
    stdout: "postgres/testbind"

  # csv format
  binding0120: # csv contains path,source comma-separated
    command: ../openrun binding list -f csv | grep ",/apps/b1," | cut -d, -f2-3
    stdout: "/apps/b1,postgres/testbind"

  # jsonl format - one json object per line
  binding0130:
    command: ../openrun binding list -f jsonl | wc -l | tr -d ' '
    stdout: "6"

  # Dry-run create does not persist
  binding0200:
    command: ../openrun binding create --dry-run postgres/testbind /apps/dry1
    stdout: "Binding /apps/dry1 created"

  binding0201: # dry-run create did not persist (still 6 bindings)
    command: ../openrun binding list -f json | jq 'length'
    stdout: "6"

  # Dry-run update does not persist
  binding0210:
    command: ../openrun binding update --dry-run --add-grant "read:*" /apps/b6
    stdout: "dry-run mode"

  binding0211: # staged grants unchanged after dry-run update
    command: ../openrun binding get -f json /apps/b6 | jq -r '.[0].staged_metadata.grants | join(",")'
    stdout: "full:*"

  # Dry-run delete does not persist
  binding0220:
    command: ../openrun binding delete --dry-run /apps/b1
    stdout: "Binding /apps/b1 deleted"

  binding0221: # dry-run delete did not remove the binding
    command: ../openrun binding get -f json /apps/b1 | jq -r '.[0].path'
    stdout: "/apps/b1"

  # Error cases
  binding0300: # create requires <source> and <binding_path> args
    command: ../openrun binding create postgres/testbind
    exit-code: 1
    stderr: "expected two args"

  binding0301: # too many args to create
    command: ../openrun binding create postgres/testbind /apps/x extra
    exit-code: 1
    stderr: "expected two args"

  binding0302: # invalid config entry on create
    command: ../openrun binding create --config nope postgres/testbind /apps/b_bad
    exit-code: 1
    stderr: "invalid config entry"

  binding0303: # metadata-json option was removed
    command: ../openrun binding create --metadata-json 'not-json' postgres/testbind /apps/b_bad
    exit-code: 1
    stderr: "flag provided but not defined"

  binding0304: # update requires <path> arg
    command: ../openrun binding update --add-grant "read:*"
    exit-code: 1
    stderr: "expected one arg"

  binding0305: # update non-existent binding
    command: ../openrun binding update --add-grant "read:*" /apps/missing
    exit-code: 1
    stderr: "binding not found with path: /apps/missing"

  binding0306: # config updates are no longer supported
    command: ../openrun binding update --config nope /apps/b1
    exit-code: 1
    stderr: "flag provided but not defined"

  binding0307: # delete non-existent binding
    command: ../openrun binding delete /apps/missing
    exit-code: 1
    stderr: "no binding found with path /apps/missing"

  binding0308: # get non-existent binding
    command: ../openrun binding get /apps/missing
    exit-code: 1
    stderr: "binding not found with path: /apps/missing"

  binding0309: # delete requires <path> arg
    command: ../openrun binding delete
    exit-code: 1
    stderr: "expected one arg"

  binding0310: # get requires <path> arg
    command: ../openrun binding get
    exit-code: 1
    stderr: "expected one arg"

  binding0311: # list does not accept positional args
    command: ../openrun binding list extra
    exit-code: 1
    stderr: "expected no args"

  binding0312: # source referencing a missing service by type/name fails
    command: ../openrun binding create postgres/missing /apps/b_bad
    exit-code: 1
    stderr: "service postgres/missing not found"

  binding0313: # source referencing a service type with no default fails
    command: ../openrun binding create mysql /apps/b_bad
    exit-code: 1
    stderr: "service mysql not found"

  binding0314: # empty source rejected
    command: ../openrun binding create "" /apps/b_bad
    exit-code: 1
    stderr: "binding source is required"

  binding0315: # creating a binding with an existing path fails
    command: ../openrun binding create postgres /apps/b1
    exit-code: 1
    stderr: "binding already exists: /apps/b1"

  binding0316: # source referencing a missing base binding fails
    command: ../openrun binding create /apps/missing /apps/b_bad
    exit-code: 1
    stderr: "binding source /apps/missing not found"

  # Failed creates above must not have persisted
  binding0317:
    command: ../openrun binding list -f json | jq 'length'
    stdout: "6"

  # Delete + list verifies removal
  binding0400:
    command: ../openrun binding delete /apps/b4
    stdout: "Binding /apps/b4 deleted"

  binding0401: # 5 bindings remain
    command: ../openrun binding list -f json | jq 'length'
    stdout: "5"

  binding0402: # /apps/b4 not in list
    command: ../openrun binding list -f json | jq -r '[.[].path] | join(",")'
    stdout: "/apps/b1,/apps/b2,/apps/b3,/apps/b5,/apps/b6"

  binding0403: # second delete of same binding fails
    command: ../openrun binding delete /apps/b4
    exit-code: 1
    stderr: "no binding found with path /apps/b4"

  # Cleanup: remove remaining bindings and the source service
  binding99999:
    command: (../openrun binding delete /apps/b6; ../openrun binding delete /apps/b1; ../openrun binding delete /apps/b2; ../openrun binding delete /apps/b3; ../openrun binding delete /apps/b5; ../openrun service delete postgres/testbind) || true
