config:
  env:
    CL_CONFIG_FILE: openrun.toml
    GOCOVERDIR: ${GOCOVERDIR}/../client
    PATH: ${PATH}
    TEST_POSTGRES_URL: ${TEST_POSTGRES_URL}
tests:
  appupdate_bindings0001: # setup service
    command: ../openrun service create --config url=${TEST_POSTGRES_URL} postgres/appupdate
    stdout: "Service postgres/appupdate created"

  appupdate_bindings0010: # setup binding 1
    command: ../openrun binding create postgres/appupdate /appupdate/b1
    stdout: "Binding /appupdate/b1 created"

  appupdate_bindings0020: # setup binding 2
    command: ../openrun binding create postgres/appupdate /appupdate/b2
    stdout: "Binding /appupdate/b2 created"

  appupdate_bindings0030: # setup binding 3
    command: ../openrun binding create postgres/appupdate /appupdate/b3
    stdout: "Binding /appupdate/b3 created"

  appupdate_bindings0040: # create fails for a missing binding
    command: ../openrun app create --bind /appupdate/missing ./testapp /app_update_missing
    exit-code: 1
    stderr: "binding /appupdate/missing not found"

  appupdate_bindings0050: # failed create did not persist
    command: ../openrun app list -f json /app_update_missing | jq length
    stdout: "0"

  appupdate_bindings0060: # create app with ordered bindings
    command: ../openrun app create --bind /appupdate/b1 --bind /appupdate/b2 ./testapp /app_update_bindings
    stdout: "App: /app_update_bindings"

  appupdate_bindings0070: # create stores binding order on prod and stage
    command: ../openrun app list -i -f json /app_update_bindings | jq -r '[.[].metadata.bindings | join(",")] | unique | join(";")'
    stdout:
      exactly: "/appupdate/b1,/appupdate/b2\n"

  appupdate_bindings0080: # update fails for a missing binding
    command: ../openrun app update bindings /appupdate/b3 /appupdate/missing /app_update_bindings
    exit-code: 1
    stderr: "binding /appupdate/missing not found"

  appupdate_bindings0090: # failed update did not change the staged binding order
    command: ../openrun app list -i -f json /app_update_bindings | jq -r 'map(select(.path == "/app_update_bindings_cl_stage"))[0].metadata.bindings | join(",")'
    stdout:
      exactly: "/appupdate/b1,/appupdate/b2\n"

  appupdate_bindings0100: # stage update replaces bindings in the requested order
    command: ../openrun app update bindings /appupdate/b3 /appupdate/b2 /appupdate/b1 /app_update_bindings
    stdout: "1 app(s) updated, 0 app(s) promoted."

  appupdate_bindings0110: # staged app has the new order
    command: ../openrun app list -i -f json /app_update_bindings | jq -r 'map(select(.path == "/app_update_bindings_cl_stage"))[0].metadata.bindings | join(",")'
    stdout:
      exactly: "/appupdate/b3,/appupdate/b2,/appupdate/b1\n"

  appupdate_bindings0120: # prod app keeps the old order until promote
    command: ../openrun app list -i -f json /app_update_bindings | jq -r 'map(select(.path == "/app_update_bindings"))[0].metadata.bindings | join(",")'
    stdout:
      exactly: "/appupdate/b1,/appupdate/b2\n"

  appupdate_bindings0130: # promoted update copies the ordered list to prod
    command: ../openrun app update bindings --promote /appupdate/b2 /appupdate/b1 /app_update_bindings
    stdout: "1 app(s) updated, 1 app(s) promoted."

  appupdate_bindings0140: # prod and stage have the promoted order
    command: ../openrun app list -i -f json /app_update_bindings | jq -r '[.[].metadata.bindings | join(",")] | unique | join(";")'
    stdout:
      exactly: "/appupdate/b2,/appupdate/b1\n"

  appupdate_bindings0150: # create app with service id auto-creates a binding
    command: ../openrun app create --bind postgres/appupdate --bind postgres/appupdate ./testapp /app_update_auto
    stdout: "App: /app_update_auto"

  appupdate_bindings0160: # create stores the deduplicated auto binding path on prod and stage
    command: bash -c 'id=$(../openrun app list -i -f json /app_update_auto | jq -r "map(select(.path == \"/app_update_auto\"))[0].id"); bindings=$(../openrun app list -i -f json /app_update_auto | jq -r "[.[].metadata.bindings | join(\",\")] | unique | join(\";\")"); [[ "$bindings" == "/auto/${id}/postgres" ]] && echo true'
    stdout: "true"

  appupdate_bindings0170: # auto binding points at the requested service
    command: bash -c 'id=$(../openrun app list -i -f json /app_update_auto | jq -r "map(select(.path == \"/app_update_auto\"))[0].id"); ../openrun binding get -f json "/auto/${id}/postgres" | jq -r ".[0].source"'
    stdout: "postgres/appupdate"

  appupdate_bindings0175: # derived binding can reference an auto binding by its canonical app id path
    command: bash -c 'id=$(../openrun app list -i -f json /app_update_auto | jq -r "map(select(.path == \"/app_update_auto\"))[0].id"); ../openrun binding create "/auto/${id}/postgres" /appupdate/auto_derived >/dev/null && ../openrun binding get -f json /appupdate/auto_derived | jq -r ".[0].source == \"/auto/${id}/postgres\""'
    stdout: "true"

  appupdate_bindings0180: # update with duplicate service ids auto-creates one binding for the app
    command: ../openrun app update bindings postgres/appupdate postgres/appupdate /app_update_bindings
    stdout: "1 app(s) updated, 0 app(s) promoted."

  appupdate_bindings0190: # staged update stores the main app auto binding path
    command: bash -c 'id=$(../openrun app list -i -f json /app_update_bindings | jq -r "map(select(.path == \"/app_update_bindings\"))[0].id"); bindings=$(../openrun app list -i -f json /app_update_bindings | jq -r "map(select(.path == \"/app_update_bindings_cl_stage\"))[0].metadata.bindings | join(\",\")"); [[ "$bindings" == "/auto/${id}/postgres" ]] && echo true'
    stdout: "true"

  appupdate_bindings0200: # staged update auto binding points at the requested service
    command: bash -c 'id=$(../openrun app list -i -f json /app_update_bindings | jq -r "map(select(.path == \"/app_update_bindings\"))[0].id"); ../openrun binding get -f json "/auto/${id}/postgres" | jq -r ".[0].source"'
    stdout: "postgres/appupdate"

  appupdate_bindings9999: # cleanup
    command: bash -c 'auto_id=$(../openrun app list -i -f json /app_update_auto | jq -r "map(select(.path == \"/app_update_auto\"))[0].id"); bindings_id=$(../openrun app list -i -f json /app_update_bindings | jq -r "map(select(.path == \"/app_update_bindings\"))[0].id"); ../openrun app delete /app_update_auto && ../openrun app delete /app_update_bindings && ../openrun binding delete /appupdate/auto_derived && ../openrun binding delete "/auto/${auto_id}/postgres" && ../openrun binding delete "/auto/${bindings_id}/postgres" && ../openrun binding delete /appupdate/b1 && ../openrun binding delete /appupdate/b2 && ../openrun binding delete /appupdate/b3 && ../openrun service delete postgres/appupdate'
