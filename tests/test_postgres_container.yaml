config:
  env:
    CL_CONFIG_FILE: config_container.toml
    GOCOVERDIR: ${GOCOVERDIR}/../client
    HTTP_PORT: ${HTTP_PORT}
    OPENRUN_CONTAINER_COMMAND: ${OPENRUN_CONTAINER_COMMAND}
    PATH: ${PATH}
    TEST_POSTGRES_URL: ${TEST_POSTGRES_URL}

tests:
  postgres_container0010: # setup flask app
    command: |
      rm -rf ./pg_flaskapp
      mkdir ./pg_flaskapp
      cat > ./pg_flaskapp/requirements.txt <<'EOF'
      flask
      pg8000
      EOF
      cat > ./pg_flaskapp/app.py <<'EOF'
      import os
      from urllib.parse import unquote, urlparse

      import pg8000.dbapi
      from flask import Flask

      app = Flask(__name__)


      def connection_kwargs(url):
          parsed = urlparse(url)
          return {
              "user": unquote(parsed.username or ""),
              "password": unquote(parsed.password or ""),
              "host": parsed.hostname,
              "port": parsed.port or 5432,
              "database": (parsed.path or "/").lstrip("/") or "postgres",
          }


      @app.route("/")
      def setup_db():
          source = "POSTGRES_URL"
          url = os.environ.get(source, "")
          if not url:
              return f"{source} missing", 500
          direct_url = os.environ.get("POSTGRES_URL_DIRECT", "")
          if not direct_url:
              return "POSTGRES_URL_DIRECT missing", 500

          parsed = urlparse(url)
          direct_parsed = urlparse(direct_url)
          conn = pg8000.dbapi.connect(**connection_kwargs(url))
          cursor = conn.cursor()
          cursor.execute("create table if not exists container_binding_items (id integer primary key, note text)")
          cursor.execute("create table if not exists container_binding_audit (id integer primary key, event text)")
          cursor.execute("insert into container_binding_items (id, note) values (1, 'from flask') on conflict (id) do nothing")
          cursor.execute("insert into container_binding_audit (id, event) values (1, 'created') on conflict (id) do nothing")
          conn.commit()
          cursor.execute("select current_schema(), count(*) from container_binding_items")
          schema, count = cursor.fetchone()
          cursor.close()
          conn.close()
          return f"source={source} host={parsed.hostname} direct_host={direct_parsed.hostname} port={parsed.port or 5432} schema={schema} count={count}"
      EOF

  postgres_container0020: # setup postgres service
    command: ../openrun service create --config url=${TEST_POSTGRES_URL} postgres/pgcontainer
    stdout: "Service postgres/pgcontainer created"

  postgres_container0030: # setup binding
    command: ../openrun binding create postgres/pgcontainer /pgcontainer/b1
    stdout: "Binding /pgcontainer/b1 created"

  postgres_container0040: # create app with postgres binding
    command: ../openrun app create --stage-at path --spec python-flask --bind /pgcontainer/b1 ./pg_flaskapp /pg_container
    stdout: "App: /pg_container"

  postgres_container0050: # prod container receives POSTGRES_URL and creates the table
    command: curl -sS localhost:${HTTP_PORT}/pg_container
    stdout: "source=POSTGRES_URL"

  postgres_container0060: # prod table was created through the binding account
    command: ../openrun binding run-command /pgcontainer/b1 "select count(*) as n from container_binding_items" | jq -r '.rows[0].n'
    stdout:
      exactly: "1\n"

  postgres_container0065: # prod app created a second table through the binding account
    command: ../openrun binding run-command /pgcontainer/b1 "select count(*) as n from container_binding_audit" | jq -r '.rows[0].n'
    stdout:
      exactly: "1\n"

  postgres_container0070: # stage container receives the staging POSTGRES_URL
    command: curl -sS localhost:${HTTP_PORT}/pg_container_cl_stage
    stdout: "schema=cl_sch_stg_"

  postgres_container0080: # staging table was created in the staging binding schema
    command: ../openrun binding run-command --staging /pgcontainer/b1 "select count(*) as n from container_binding_items" | jq -r '.rows[0].n'
    stdout:
      exactly: "1\n"

  postgres_container0090: # setup non-default postgres service
    command: ../openrun service create --config url=${TEST_POSTGRES_URL} postgres/pgprivate
    stdout: "Service postgres/pgprivate created"

  postgres_container0091: # setup binding to non-default service source
    command: ../openrun binding create postgres/pgprivate /pgcontainer/private
    stdout: "Binding /pgcontainer/private created"

  postgres_container0092: # create app with non-default binding source
    command: ../openrun app create --spec python-flask --bind /pgcontainer/private ./pg_flaskapp /pg_container_private
    stdout: "App: /pg_container_private"

  postgres_container0093: # non-default binding source is blocked until approved
    command: curl -sS localhost:${HTTP_PORT}/pg_container_private
    stdout: "not approved to use binding source postgres/pgprivate"

  postgres_container0094: # request non-default binding source permission
    command: ../openrun app update bind-perm postgres/pgprivate /pg_container_private
    stdout: "1 app(s) updated, 0 app(s) promoted."

  postgres_container0095: # approve and promote the non-default source permission
    command: ../openrun app approve --promote /pg_container_private
    stdout: "1 app(s) audited, 1 app(s) approved, 1 app(s) promoted."

  postgres_container0096: # approved non-default binding source now reaches the container
    command: curl -sS localhost:${HTTP_PORT}/pg_container_private
    stdout: "source=POSTGRES_URL"

  postgres_container9999: # cleanup
    command: (../openrun app delete /pg_container_private; ../openrun app delete /pg_container; ../openrun binding delete /pgcontainer/private; ../openrun binding delete /pgcontainer/b1; ../openrun service delete postgres/pgprivate; ../openrun service delete postgres/pgcontainer; rm -rf ./pg_flaskapp) || true
