config:
  env:
    CL_CONFIG_FILE: openrun.toml
    GOCOVERDIR: ${GOCOVERDIR}/../client
tests:
  perms0100: # copy disk usage app
    command: cp -r ../examples/disk_usage ./perms_disk_usage
  perms0102: # Update code to WRITE type
    command: perl -i -pe 's/"abs"/"abs", type="WRITE"/g' ./perms_disk_usage/app.star
  perms0103: # Create app1
    command: ../openrun app create --stage-at path --approve ./perms_disk_usage /perms1
  perms0104: # Create app2
    command: ../openrun app create --stage-at path --approve ./perms_disk_usage /perms2
  perms0105: # test prod app
    command: curl -su "admin:qwerty" localhost:25222/perms1
    stdout: "Disk Usage"
  perms0106: # test stage app
    command: curl -su "admin:qwerty" localhost:25222/perms1_cl_stage
    stdout: "Disk Usage"
  perms0107: # Update stage perms
    command: ../openrun app settings stage-write-access false "/perms*"
  perms0108: # test stage app
    command: curl -su "admin:qwerty" localhost:25222/perms1_cl_stage
    stdout: "Stage app does not have access to write operation"
  perms0109: # Update stage perms again to allow write
    command: ../openrun app settings stage-write-access true "/perms*"
  perms0110: # test stage app
    command: curl -su "admin:qwerty" localhost:25222/perms1_cl_stage
    stdout: "Disk Usage"
  perms0111: # test prod app
    command: curl -su "admin:qwerty" localhost:25222/perms1
    stdout: "Disk Usage"
  perms0112: # Update code to change plugin call to be READ type
    command: perl -i -pe 's/type="WRITE"/type="READ"/g' ./perms_disk_usage/app.star
  perms0113: # Reload apps
    command: ../openrun app reload --approve "/perms*"
    stdout: "2 app(s) reloaded, 0 app(s) skipped, 0 app(s) approved, 0 app(s) promoted."
  perms0114: # test stage app
    command: curl -su "admin:qwerty" localhost:25222/perms1_cl_stage
    stdout: "Disk Usage"

  # Test RBAC permit on plugin calls
  perms0120: # Create plugin permit app
    command: |
      mkdir -p ./perms_plugin_permit
      printf '%s\n' 'load("exec.in", "exec")' '' 'def handler(req):' '    ret = exec.run("echo", ["permit-ok"])' '    if ret.error:' '        return ret.error' '    return ret.value' '' 'app = ace.app("permit plugin", routes=[ace.api("/", type=ace.TEXT)], permissions=[ace.permission("exec.in", "run", ["echo"], permit=["plugin_exec"])])' > ./perms_plugin_permit/app.star
  perms0121: # Enable RBAC with app access, but without custom plugin permission
    command: |
      ../openrun server show-config | jq '.rbac = {"enabled": true, "groups": {}, "roles": {"accessor": ["access"], "plugin_runner": ["custom:plugin_exec"]}, "grants": [{"description": "permit app access", "users": ["anonymous"], "roles": ["accessor"], "targets": ["/perms_plugin_permit"]}]}' > perms_rbac_config.json && ../openrun server update-config --force perms_rbac_config.json
  perms0122: # Create app with plugin permit
    command: ../openrun app create --auth=rbac:none --approve ./perms_plugin_permit /perms_plugin_permit
    stdout: "permit=plugin_exec"
  perms0123: # Plugin call denied when user lacks custom permission
    command: curl localhost:25222/perms_plugin_permit
    stdout: "user anonymous does not have any required permission [plugin_exec]"
  perms0124: # Grant custom plugin permission
    command: |
      ../openrun server show-config | jq '.rbac.grants += [{"description": "permit plugin call", "users": ["anonymous"], "roles": ["plugin_runner"], "targets": ["/perms_plugin_permit"]}]' > perms_rbac_config.json && ../openrun server update-config --force perms_rbac_config.json
  perms0125: # Plugin call allowed when user has custom permission
    command: curl localhost:25222/perms_plugin_permit
    stdout: "permit-ok"
  perms0126: # Reset RBAC config
    command: |
      ../openrun server show-config | jq '.rbac = {"enabled": false, "groups": {}, "roles": {}, "grants": []}' > perms_rbac_config.json && ../openrun server update-config --force perms_rbac_config.json

  # Test preview app
  # These tests depend on a commit which has the disk usage app set to write type for the fs plugin. If the app requires
  # updates, these commits have to be recreated. See:
  # https://github.com/openrundev/openrun/commit/0e23273f82701c7ecb4f9f6b4e2a4c6ea154c0ec
  perms0200: # Create preview app from git
    command: ../openrun app create --approve github.com/openrundev/openrun/examples/disk_usage /permsgit1
  perms0201: # Create preview app from git
    command: ../openrun app create --approve github.com/openrundev/openrun/examples/disk_usage /permsgit2
  perms0202: # Create preview app
    command: ../openrun preview create --approve 0e23273f82701c7ecb4f9f6b4e2a4c6ea154c0ec /permsgit1
  perms0203: # test preview app
    command: curl -su "admin:qwerty" localhost:25222/permsgit1_cl_preview_0e23273f82701c7ecb4f9f6b4e2a4c6ea154c0ec
    stdout: "Disk Usage"
  perms0204: # Update preview perms
    command: ../openrun app settings preview-write-access false "/perms*"
  perms0205: # test preview app
    command: curl -su "admin:qwerty" localhost:25222/permsgit1_cl_preview_0e23273f82701c7ecb4f9f6b4e2a4c6ea154c0ec
    stdout: "Preview app does not have access to write operation"
  perms0206: # Create preview app for non git
    command: ../openrun preview create 0e23273f82701c7ecb4f9f6b4e2a4c6ea154c0ec /perms1
    stderr: "source is not git"
    exit-code: 1

  perms0300: # List apps perm1
    command: "../openrun app list -i /permsgit1 | grep app_ | wc -l"
    stdout:
      exactly: "3"
  perms0301: # List apps perm2
    command: "../openrun app list -i /permsgit2 | grep app_ | wc -l"
    stdout:
      exactly: "2"

  perms_cleanup: # Cleanup
    command: rm -rf ./perms_disk_usage ./perms_plugin_permit perms_rbac_config.json && ../openrun app delete "/perms*"
