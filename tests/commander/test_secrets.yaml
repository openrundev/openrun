config:
  env:
    CL_CONFIG_FILE: openrun.toml
    GOCOVERDIR: ${GOCOVERDIR}/../client
tests:
  secret0010: # create with a generated name from a prefix
    command: ../openrun secret create --value "cli-test-value" clitest_pass
    stdout: 'Use in app params/config as: {{secret_from "db" "clitest_pass_'
    exit-code: 0
  secret0020: # create with an explicit name
    command: ../openrun secret create --name clitest_token --value tok123 --description "cli token"
    stdout: "Secret created: clitest_token"
    exit-code: 0
  secret0030: # duplicate create fails without --update
    command: ../openrun secret create --name clitest_token --value tok456
    stderr: "already exists"
    exit-code: 1
  secret0040: # update the value
    command: ../openrun secret create --name clitest_token --update --value tok456
    stdout: "Secret updated: clitest_token"
    exit-code: 0
  secret0045: # update requires an explicit name, not a prefix
    command: ../openrun secret create --update --value x clitest_token
    stderr: "update requires an explicit name"
    exit-code: 1
  secret0050: # reveal prints the value
    command: ../openrun secret show --reveal clitest_token
    stdout: "tok456"
    exit-code: 0
  secret0060: # show without reveal does not print the value
    command: ../openrun secret show clitest_token
    stdout:
      contains:
        - '"name": "clitest_token"'
        - '"description": "cli token"'
      not-contains:
        - "tok456"
    exit-code: 0
  secret0070: # list with a glob
    command: ../openrun secret list --format csv "clitest_*"
    stdout:
      line-count: 2
      not-contains:
        - "tok456"
        - "cli-test-value"
    exit-code: 0
  secret0080: # secret value from a file
    command: printf "file-secret" > secret_value.txt && ../openrun secret create --file secret_value.txt clitest_file && rm secret_value.txt
    stdout: "Secret created: clitest_file_"
    exit-code: 0
  secret0090: # value resolves through the db provider in a plugin argument
    command: ../openrun secret show --reveal $(../openrun secret list --format csv "clitest_file_*" | cut -d, -f1)
    stdout: "file-secret"
    exit-code: 0
  secret0100: # rekey is a no-op when all rows use the active key
    command: ../openrun secret rekey
    stdout: "Secrets re-encrypted: 0 rekeyed, 0 skipped"
    exit-code: 0
  secret0110: # delete
    command: ../openrun secret delete clitest_token
    stdout: "Secret deleted: clitest_token"
    exit-code: 0
  secret0120: # delete again fails
    command: ../openrun secret delete clitest_token
    stderr: "secret not found"
    exit-code: 1
  secret0130: # cleanup the generated name secrets
    command: for s in $(../openrun secret list --format csv "clitest_*" | cut -d, -f1); do ../openrun secret delete $s; done && ../openrun secret list --format csv "clitest_*" | wc -l
    stdout: "0"
    exit-code: 0
