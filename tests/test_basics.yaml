config:
  env:
    CL_CONFIG_FILE: config_basic_test.toml
    GOCOVERDIR: ${GOCOVERDIR}/../client
    BASIC_HTTP_PORT: ${BASIC_HTTP_PORT}
    BASIC_HTTPS_PORT: ${BASIC_HTTPS_PORT}

tests:
  basic010:
    command: ../openrun app list /invalid # Connects over UDS
    stdout:
      line-count: 1 # Only header is printed
    exit-code: 0

  basic020:
    command: CL_CONFIG_FILE=config_basic_client_np.toml ../openrun app list /invalid
    stderr: "error: 404 page not found" # admin api's are disabled over http
    stdout:
      line-count: 0
    exit-code: 1

  basic030:
    command: CL_CONFIG_FILE=config_basic_client.toml ../openrun app list /invalid # No app
    stderr: "error: 404 page not found" # admin api's are disabled over http
    stdout:
      line-count: 0
    exit-code: 1

  basic040:
    command: CL_CONFIG_FILE=config_basic_client_https.toml ../openrun app list /invalid # Test TLS
    exit-code: 1 # error can be 404 (if mkcert is installed) or cert check failure (if no mkcert)

  basic050:
    command: CL_CONFIG_FILE=config_basic_client_https_skip.toml ../openrun app list /invalid # TLS with skip_cert_check
    stderr: "error: 404 page not found" # admin api's are disabled over http
    stdout:
      line-count: 0
    exit-code: 1

  basic060: ## create test1 app with default of authentication enabled
    command: ../openrun app create ./testapp /test1
    exit-code: 0

  basic070: # check curl works with password
    command: curl -sS -u "admin:abcd" localhost:${BASIC_HTTP_PORT}/test1
    stdout: "Test app body"

  basic080: # check curl fails without password
    command: curl -sS localhost:${BASIC_HTTP_PORT}/test1
    stdout:
      exactly: "Authentication failed"

  basic090: # check curl fails with wrong password
    command: curl -sS -u "admin:abcd2" localhost:${BASIC_HTTP_PORT}/test1
    stdout:
      exactly: "Authentication failed"

  basic100: # check curl fails with wrong user
    command: curl -sS -u "admin2:abcd" localhost:${BASIC_HTTP_PORT}/test1
    stdout:
      exactly: "Authentication failed"

  basic110: # a browser navigation (Accept text/html) is redirected to the form login page
    command: 'curl -sS -o /dev/null -w "%{redirect_url}" -H "Accept: text/html" localhost:${BASIC_HTTP_PORT}/test1'
    stdout: "://auth.localhost:" # 302 to the login page on the auth callback domain (port not substituted in matchers)
    exit-code: 0

  basic111: # the redirect target is the login page with a state token
    command: 'curl -sS -o /dev/null -w "%{redirect_url}" -H "Accept: text/html" localhost:${BASIC_HTTP_PORT}/test1'
    stdout: "/_openrun/auth/login?state="
    exit-code: 0

  basic120: # the login page is served only from the auth callback domain, not the app domain
    command: 'curl -sS -o /dev/null -w "%{http_code}" -H "Accept: text/html" localhost:${BASIC_HTTP_PORT}/_openrun/auth/login?state=x'
    stdout:
      exactly: "404"
    exit-code: 0

  basic121: # the login page renders on the auth domain, showing the expired variant for a bogus state
    command: 'curl -sS --resolve auth.localhost:${BASIC_HTTP_PORT}:127.0.0.1 -H "Accept: text/html" "http://auth.localhost:${BASIC_HTTP_PORT}/_openrun/auth/login?state=x"'
    stdout: "The sign-in request has expired."
    exit-code: 0

  basic122: # the auth domain login page sets the locked-down CSP header (GET, headers dumped; the route is GET-only)
    command: 'curl -sS -o /dev/null -D - --resolve auth.localhost:${BASIC_HTTP_PORT}:127.0.0.1 "http://auth.localhost:${BASIC_HTTP_PORT}/_openrun/auth/login?state=x" | grep -ci "content-security-policy: default-src .none.; style-src .self.;"'
    stdout:
      exactly: "1"
    exit-code: 0

  basic123: # no apps can be created on the auth callback domain
    command: ../openrun app create ./testapp auth.localhost:/nope
    stderr: "apps cannot be created on the auth callback domain"
    exit-code: 1

  basic124: # non-login paths on the auth callback domain are refused (no app, no fallback)
    command: 'curl -sS -o /dev/null -w "%{http_code}" --resolve auth.localhost:${BASIC_HTTP_PORT}:127.0.0.1 "http://auth.localhost:${BASIC_HTTP_PORT}/test1"'
    stdout:
      exactly: "404"
    exit-code: 0

  basic130: # logout page (no session) renders the not-signed-in variant on the app domain
    command: 'curl -sS -H "Accept: text/html" localhost:${BASIC_HTTP_PORT}/_openrun/logout'
    stdout: "You are not signed in."
    exit-code: 0

  basic131: # logout done page renders the signed-out variant
    command: 'curl -sS -H "Accept: text/html" "localhost:${BASIC_HTTP_PORT}/_openrun/logout?done=1"'
    stdout: "You have been signed out."
    exit-code: 0

  basic132: # logout page carries the same locked-down CSP as the login page
    command: 'curl -sS -o /dev/null -D - localhost:${BASIC_HTTP_PORT}/_openrun/logout | grep -ci "content-security-policy: default-src .none.; style-src .self.;"'
    stdout:
      exactly: "1"
    exit-code: 0

  basic133: # logout POST redirects to the signed-out page (303); an open-redirect target is dropped, landing on /_openrun/logout
    command: 'curl -sS -o /dev/null -w "%{redirect_url}" --data-urlencode "redirect=https://evil.com/x" localhost:${BASIC_HTTP_PORT}/_openrun/logout'
    stdout: "/_openrun/logout?done=1" # not evil.com
    exit-code: 0

  basic160: ## create test2 app with authentication disabled
    command: ../openrun app create ./testapp /test2
    exit-code: 0

  basic161: ## Check static files are using optimized fetch path (no compression/decompression)
    ## The data should be streamed directly from sqlite. x-openrun-compressed header should be true
    command: 'curl -sI -u "admin:abcd" -H "Accept-Encoding: br" localhost:${BASIC_HTTP_PORT}/test2/static/gen/lib/htmx-491955cd1810747d7d7b9ccb936400afb760e06d25d53e4572b64b6563b2784e.min.js | grep -e "X-Openrun-Compressed: true" -e "Content-Encoding: br" -e "Content-Length: 15595" | wc -l'
    stdout:
      exactly: "3"
    exit-code: 0

  basic162: ## Check static files are using are gzipped when only gzip encoding is accepted
    command: 'curl -sI -u "admin:abcd" -H "Accept-Encoding: gzip" localhost:${BASIC_HTTP_PORT}/test2/static/gen/lib/htmx-491955cd1810747d7d7b9ccb936400afb760e06d25d53e4572b64b6563b2784e.min.js | grep -e "X-Openrun-Compressed: true" -e "Content-Encoding: gzip" | wc -l'
    stdout:
      exactly: "1" # X-OpenRun-Compressed is not set, content length depends on gzip
    exit-code: 0

  basic163: ## Check static files are not compressed if no encoding is accepted
    command: 'curl -sI -u "admin:abcd" localhost:${BASIC_HTTP_PORT}/test2/static/gen/lib/htmx-491955cd1810747d7d7b9ccb936400afb760e06d25d53e4572b64b6563b2784e.min.js | grep -e "X-OpenRun-Compressed: true" -e "Content-Encoding: " -e "Content-Length: 50387" | wc -l'
    stdout:
      exactly: "1" # X-OpenRun-Compressed is not set, encoding is not set
    exit-code: 0

  #basic164: ## Check HTTP early hints (early hints are disabled by default)
  #  command: 'curl -kv -H "sec-fetch-mode: navigate" —http2 https://localhost:${BASIC_HTTPS_PORT}/test2?aaaa'
  #  stderr: "HTTP/2 103"

  basic170: # check curl works with password
    command: curl -sS -u "admin:abcd" localhost:${BASIC_HTTP_PORT}/test2
    stdout: "Test app body"

  basic180: # check curl without auth
    command: curl -sS localhost:${BASIC_HTTP_PORT}/test2
    stdout: "Authentication failed"

  basic181: # check curl with wrong password
    command: curl -sS -u "admin:abcd2" localhost:${BASIC_HTTP_PORT}/test2
    stdout: "Authentication failed"

  basic182: # check curl with wrong user
    command: curl -sS -u "admin2:abcd" localhost:${BASIC_HTTP_PORT}/test2
    stdout: "Authentication failed"

  basic190: ## create test2 app with authentication disabled
    command: ../openrun app create --auth=none ./testapp /test_na
    exit-code: 0

  basic191: # check curl without auth
    command: curl -sS localhost:${BASIC_HTTP_PORT}/test_na
    stdout: "Authentication required" # auth_required is true, so this fails

  basic192: # check curl with auth
    command: curl -sS -u "admin:abcd" localhost:${BASIC_HTTP_PORT}/test_na
    stdout: "Authentication required" # auth_required is true, so this fails

  basic193: # delete app
    command: ../openrun app delete /test_na

  basic250: # Clear generated files
    command: rm -rf ./testapp/static/gen ./testapp/index_gen.go.html ./testapp/config_gen.lock ./testapp/openrun_gen.go.html
    exit-code: 0

  basic260: # create test3 app with auth specifically enabled. dev is used to check if files are created fine
    command: ../openrun app create --dev --auth=default ./testapp /test3
    exit-code: 0

  basic260a: # List shows auth as DEFAULT
    command: "../openrun app list --format csv /test3 | grep DEFAULT | wc -l"
    stdout:
      exactly: "1"
    exit-code: 0

  basic270: # check curl works with password
    command: curl -sS -u "admin:abcd" localhost:${BASIC_HTTP_PORT}/test3
    stdout: "Test app body"

  basic280: # check curl fails without password
    command: curl -sS localhost:${BASIC_HTTP_PORT}/test3
    stdout:
      exactly: "Authentication failed"

  basic290: # check curl fails with wrong password
    command: curl -sS -u "admin:abcd2" localhost:${BASIC_HTTP_PORT}/test3
    stdout:
      exactly: "Authentication failed"

  basic300: # check curl fails with wrong user
    command: curl -sS -u "admin2:abcd" localhost:${BASIC_HTTP_PORT}/test3
    stdout:
      exactly: "Authentication failed"

  basic400: # check version command output
    command: ../openrun --version
    stdout: "OpenRun version"
    stderr:
      line-count: 0
    exit-code: 0

  basic500: # Test app list command
    command: ../openrun app list
    stderr:
      line-count: 0
    stdout:
      line-count: 4
      contains:
        - "Name                           Id                                  Type  Version"
        - "PROD        1 DEFAULT"
    exit-code: 0
  basic501: # Test app list command
    command: ../openrun app list
    stderr:
      line-count: 0
    stdout:
      contains:
        - "TestApp                        app_prd_"
    exit-code: 0
  basic510: # Test app list command with internal
    command: ../openrun app list --internal
    stderr:
      line-count: 0
    stdout:
      line-count: 6 # two prod mode apps have an staging app each
      contains:
        - "Type  Version Auth"
        - "app_stg_"
    exit-code: 0

  basic520: # Test app list command with filter
    command: ../openrun app list "*"
    stdout:
      line-count: 4
  basic530: # Test app list command with domain filter
    command: ../openrun app list "invalid:*"
    stdout:
      line-count: 1
    exit-code: 0
  basic540: # Test app list command with app filter
    command: ../openrun app list /test2*
    stdout:
      line-count: 2
    exit-code: 0
  basic550: # Test app list command with jsonl format
    command: ../openrun app list --format jsonl /test2*
    stdout:
      contains:
        - '"is_dev":false,'
      line-count: 1
    exit-code: 0
  basic560: # Test app list command with csv format
    command: ../openrun app list --format csv /test2*
    stdout:
      contains:
        - "PROD,1"
      line-count: 1
    exit-code: 0
  basic570: # Test app list command with json format
    command: ../openrun app list --format json /test2*
    stdout:
      contains:
        - '"is_dev": false,'
    exit-code: 0
  basic580: # Test app list command with jsonl_pretty format
    command: ../openrun app list --format jsonl_pretty /test2
    stdout:
      contains:
        - '"is_dev": false,'
    exit-code: 0
  basic590: # Reload one app
    command: ../openrun app reload /test2
    exit-code: 0
  basic600: # After reload, prod app should be at version 1
    command: '../openrun app list --format csv /test2 | grep ",1," | wc -l'
    stdout:
      exactly: "1"
    exit-code: 0
  basic601: # After reload, stage app should be at version 2
    command: '../openrun app list --internal --format csv /test2 | grep app_stg_ | grep ",2," | wc -l'
    stdout:
      exactly: "1"
    exit-code: 0
  basic610: # Promote the change
    command: ../openrun app promote /test2
    exit-code: 0
  basic620: # After promote, both are on version 2
    command: '../openrun app list --internal --format csv /test2 | grep ",2," | wc -l'
    stdout:
      exactly: "2"
    exit-code: 0
  basic630: # Promote the change again, no op
    command: ../openrun app promote /test2
    exit-code: 0
  basic640: # After promote, both are on version 2
    command: '../openrun app list --internal --format csv /test2* | grep ",2," | wc -l'
    stdout:
      exactly: "2"
    exit-code: 0
  basic650: # Reload with promote option
    command: ../openrun app reload --promote /test2
    exit-code: 0
  basic660: # Both are on version 3
    command: '../openrun app list --internal --format csv /test2 | grep ",3," | wc -l'
    stdout:
      exactly: "2"
    exit-code: 0

  basic700: # Create local source for static_disk spec
    command: bash -c 'rm -rf static_disk_src && mkdir -p static_disk_src/nested && printf "disk index v1" > static_disk_src/index.html && printf "disk nested file" > static_disk_src/nested/file.txt'
    exit-code: 0

  basic710: # Create static_disk app
    command: ../openrun app create --approve --stage-at path --spec static_disk --param index=index.html ./static_disk_src /static_disk
    exit-code: 0

  basic720: # static_disk serves index file from disk
    command: curl -sS -u "admin:abcd" localhost:${BASIC_HTTP_PORT}/static_disk
    stdout:
      exactly: "disk index v1"
    exit-code: 0

  basic730: # static_disk serves non-index files when single_file is not set
    command: curl -sS -u "admin:abcd" localhost:${BASIC_HTTP_PORT}/static_disk/nested/file.txt
    stdout:
      exactly: "disk nested file"
    exit-code: 0

  basic740: # static_disk source file changes are served directly from disk
    command: bash -c 'printf "disk index v2" > static_disk_src/index.html'
    exit-code: 0

  basic750: # static_disk serves updated disk content without app reload
    command: curl -sS -u "admin:abcd" localhost:${BASIC_HTTP_PORT}/static_disk
    stdout:
      exactly: "disk index v2"
    exit-code: 0

  basic760: # static_disk continues serving non-index files after disk changes
    command: curl -sS -u "admin:abcd" localhost:${BASIC_HTTP_PORT}/static_disk/nested/file.txt
    stdout:
      exactly: "disk nested file"
    exit-code: 0

  basic770: # Create static_disk single_file app
    command: ../openrun app create --approve --stage-at path --spec static_disk --param index=index.html --param single_file=True ./static_disk_src /static_disk_single
    exit-code: 0

  basic780: # static_disk single_file serves the index file
    command: curl -sS -u "admin:abcd" localhost:${BASIC_HTTP_PORT}/static_disk_single
    stdout:
      exactly: "disk index v2"
    exit-code: 0

  basic790: # static_disk single_file does not serve other files
    command: curl -sS -u "admin:abcd" localhost:${BASIC_HTTP_PORT}/static_disk_single/nested/file.txt
    stdout: "404 page not found"
    exit-code: 0

  basic800: # Clean up static_disk source
    command: rm -rf static_disk_src
    exit-code: 0
