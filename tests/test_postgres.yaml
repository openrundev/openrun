config:
  env:
    CL_CONFIG_FILE: openrun.toml
    GOCOVERDIR: ${GOCOVERDIR}/../client
    PATH: ${PATH}
    TEST_POSTGRES_URL: ${TEST_POSTGRES_URL}

tests:
  postgres0001:
    command: ../openrun service create --config url=${TEST_POSTGRES_URL} postgres/pg1
    stdout: "Service postgres/pg1 created"
    exit-code: 0

  postgres0010:
    command: ../openrun binding create postgres/pg1 /apps/b1
    stdout: "Binding /apps/b1 created"
    exit-code: 0

  postgres0011: # prod and staging accounts use different schemas
    command: bash -c 'prod=$(../openrun binding run-command /apps/b1 "select current_schema()" | jq -r ".rows[0].current_schema"); stage=$(../openrun binding run-command --staging /apps/b1 "select current_schema()" | jq -r ".rows[0].current_schema"); [[ "$prod" != "$stage" ]] && echo true'
    stdout: "true"

  postgres0012: # setup container app that touches postgres during startup
    command: |
      rm -rf ./pg_verifyapp
      mkdir ./pg_verifyapp
      cat > ./pg_verifyapp/requirements.txt <<'EOF'
      flask
      pg8000
      EOF
      cat > ./pg_verifyapp/app.py <<'EOF'
      import os
      from urllib.parse import unquote, urlparse

      import pg8000.dbapi
      from flask import Flask

      app = Flask(__name__)


      def connection_kwargs(url):
          parsed = urlparse(url)
          return {
              "user": unquote(parsed.username or ""),
              "password": unquote(parsed.password or ""),
              "host": parsed.hostname,
              "port": parsed.port or 5432,
              "database": (parsed.path or "/").lstrip("/") or "postgres",
          }


      def initialize_db():
          url = os.environ.get("POSTGRES_URL", "")
          if not url:
              raise RuntimeError("POSTGRES_URL missing")
          conn = pg8000.dbapi.connect(**connection_kwargs(url))
          cursor = conn.cursor()
          cursor.execute("create table if not exists verify_startup_items (id integer primary key, note text)")
          cursor.execute("insert into verify_startup_items (id, note) values (1, 'verified') on conflict (id) do nothing")
          conn.commit()
          cursor.close()
          conn.close()


      initialize_db()


      @app.route("/")
      def index():
          return "verified"
      EOF
      cat > ./pg_verify.star <<'EOF'
      verify_data = binding("/apps/bverify", "postgres/pg1")
      app("/pg_verify_app", "./pg_verifyapp", spec="python-flask", bindings=[verify_data.path], verify=True)
      EOF

  postgres0013: # apply creates the binding and verified container app together
    command: ../openrun apply --approve ./pg_verify.star /pg_verify_app
    stderr: "1 app(s) created, 0 app(s) updated, 0 app(s) reloaded, 0 app(s) skipped, 0 app(s) approved, 0 app(s) promoted."

  postgres0014: # verified prod container created a table through the new binding account
    command: ../openrun binding run-command /apps/bverify "select count(*) as n from verify_startup_items" | jq -r '.rows[0].n'
    stdout: "1"

  postgres0015: # verified stage container also used the staging binding account
    command: ../openrun binding run-command --staging /apps/bverify "select count(*) as n from verify_startup_items" | jq -r '.rows[0].n'
    stdout: "1"

  postgres0016: # failed verify rolls back the binding and deletes the role/schema artifacts
    command: |
      rm -rf ./pg_failapp
      mkdir ./pg_failapp
      cat > ./pg_failapp/requirements.txt <<'EOF'
      flask
      EOF
      cat > ./pg_failapp/app.py <<'EOF'
      raise RuntimeError("startup failure for verify rollback test")
      EOF
      cat > ./pg_failverify.star <<'EOF'
      fail_data = binding("/apps/bfailverify", "postgres/pg1")
      app("/pg_fail_app", "./pg_failapp", spec="python-flask", bindings=[fail_data.path], verify=True)
      EOF
      count_artifacts() {
        ../openrun binding run-command /apps/b1 "select (select count(*) from pg_roles where rolname like 'cl_rol_%') as roles, (select count(*) from pg_namespace where nspname like 'cl_sch_%') as schemas" | jq -r '"\(.rows[0].roles)/\(.rows[0].schemas)"'
      }
      before=$(count_artifacts)
      ../openrun apply --approve ./pg_failverify.star /pg_fail_app && echo "apply unexpectedly succeeded"
      after=$(count_artifacts)
      ../openrun binding list | grep bfailverify && echo "binding unexpectedly persisted"
      [ "$before" = "$after" ] && echo "artifacts_rolled_back"
    stdout: "artifacts_rolled_back"

  postgres0020: # table-specific grant can be created before the table exists
    command: ../openrun binding create --grant "read:test1" /apps/b1 /apps/b1partialread
    stdout: "Binding /apps/b1partialread created"

  postgres0021: # before creation, the target table is absent
    command: ../openrun binding run-command /apps/b1partialread "select count(*) as n from test1"
    stderr: 'relation "test1" does not exist'
    exit-code: 1

  postgres0030:
    command: ../openrun binding run-command /apps/b1 "create table test1 (id integer primary key, note text)"
    stdout: '"command_tag": "CREATE TABLE"'

  postgres0031:
    command: ../openrun binding run-command /apps/b1 "insert into test1 (id, note) values (1, 'base')"
    stdout: '"rows_affected": 1'

  postgres0032: # deferred table grant is not applied until the binding is updated
    command: ../openrun binding run-command /apps/b1partialread "select count(*) as n from test1"
    stderr: "permission denied for table test1"
    exit-code: 1

  postgres0033:
    command: ../openrun binding update --promote /apps/b1partialread
    stdout: "Binding /apps/b1partialread updated"

  postgres0034:
    command: ../openrun binding run-command /apps/b1partialread "select count(*) as n from test1" | jq -r '.rows[0].n'
    stdout: "1"

  postgres0035: # prod table is not visible through the staging schema
    command: ../openrun binding run-command --staging /apps/b1 "select count(*) as n from test1"
    stderr: 'relation "test1" does not exist'
    exit-code: 1

  postgres0040:
    command: ../openrun binding create --grant "read:*" /apps/b1 /apps/b1read
    stdout: "Binding /apps/b1read created"

  postgres0041:
    command: ../openrun binding run-command /apps/b1read "select count(*) as n from test1" | jq -r '.rows[0].n'
    stdout: "1"

  postgres0042: # read grant cannot insert into base tables
    command: ../openrun binding run-command /apps/b1read "insert into test1 (id, note) values (2, 'read')"
    stderr: "permission denied for table test1"
    exit-code: 1

  postgres0043: # read grant cannot create tables
    command: ../openrun binding run-command /apps/b1read "create table read_created (id integer)"
    stderr: "permission denied for schema"
    exit-code: 1

  postgres0044: # default privileges from read:* cover tables created after the grant
    command: ../openrun binding run-command /apps/b1 "create table test2 (id integer primary key, note text)"
    stdout: '"command_tag": "CREATE TABLE"'

  postgres0045:
    command: ../openrun binding run-command /apps/b1 "insert into test2 (id, note) values (1, 'future')"
    stdout: '"rows_affected": 1'

  postgres0046:
    command: ../openrun binding run-command /apps/b1read "select count(*) as n from test2" | jq -r '.rows[0].n'
    stdout: "1"

  postgres0046a: # simulate an already-recorded grant missing from the database
    command: bash -c 'role=$(../openrun binding show-account /apps/b1read | jq -r ".role"); ../openrun binding run-command /apps/b1 "revoke select on table test2 from \"$role\""'
    stdout: '"command_tag": "REVOKE"'

  postgres0046b:
    command: ../openrun binding run-command /apps/b1read "select count(*) as n from test2"
    stderr: "permission denied for table test2"
    exit-code: 1

  postgres0046c:
    command: ../openrun binding update --reapply-all --promote /apps/b1read
    stdout: "Binding /apps/b1read updated"

  postgres0046d: # reapply-all restores grants that were already marked applied
    command: ../openrun binding run-command /apps/b1read "select count(*) as n from test2" | jq -r '.rows[0].n'
    stdout: "1"

  postgres0047: # read:* still cannot write to future tables
    command: ../openrun binding run-command /apps/b1read "insert into test2 (id, note) values (2, 'read')"
    stderr: "permission denied for table test2"
    exit-code: 1

  postgres0048: # table-specific read does not leak to other tables
    command: ../openrun binding run-command /apps/b1partialread "select count(*) as n from test2"
    stderr: "permission denied for table test2"
    exit-code: 1

  postgres0050:
    command: ../openrun binding create --grant "create:*" /apps/b1 /apps/b1create
    stdout: "Binding /apps/b1create created"

  postgres0051:
    command: ../openrun binding run-command /apps/b1create "create table create_created (id integer)"
    stdout: '"command_tag": "CREATE TABLE"'

  postgres0052: # create grant does not include read on base tables
    command: ../openrun binding run-command /apps/b1create "select count(*) as n from test1"
    stderr: "permission denied for table test1"
    exit-code: 1

  postgres0053: # create grant does not include write on base tables
    command: ../openrun binding run-command /apps/b1create "insert into test1 (id, note) values (3, 'create')"
    stderr: "permission denied for table test1"
    exit-code: 1

  postgres0054: # grant updates apply to staging before production
    command: ../openrun binding run-command --staging /apps/b1 "create table stg_only (id integer primary key)"
    stdout: '"command_tag": "CREATE TABLE"'

  postgres0055:
    command: ../openrun binding run-command --staging /apps/b1 "insert into stg_only (id) values (1)"
    stdout: '"rows_affected": 1'

  postgres0056:
    command: ../openrun binding create /apps/b1 /apps/b1stage
    stdout: "Binding /apps/b1stage created"

  postgres0057:
    command: ../openrun binding run-command --staging /apps/b1stage "select count(*) as n from stg_only"
    stderr: "permission denied for table stg_only"
    exit-code: 1

  postgres0058:
    command: ../openrun binding update --add-grant "read:*" /apps/b1stage
    stdout: "Binding /apps/b1stage updated"

  postgres0059:
    command: ../openrun binding run-command --staging /apps/b1stage "select count(*) as n from stg_only" | jq -r '.rows[0].n'
    stdout: "1"

  postgres0059a: # prod remains unchanged until promote
    command: ../openrun binding run-command /apps/b1stage "select count(*) as n from test1"
    stderr: "permission denied for table test1"
    exit-code: 1

  postgres0059b:
    command: ../openrun binding update --promote /apps/b1stage
    stdout: "Binding /apps/b1stage updated"

  postgres0059c:
    command: ../openrun binding run-command /apps/b1stage "select count(*) as n from test1" | jq -r '.rows[0].n'
    stdout: "1"

  postgres0059d: # delete-grant revokes staged access before prod
    command: ../openrun binding update --delete-grant "read:*" /apps/b1stage
    stdout: "Binding /apps/b1stage updated"

  postgres0059e:
    command: ../openrun binding run-command --staging /apps/b1stage "select count(*) as n from stg_only"
    stderr: "permission denied for table stg_only"
    exit-code: 1

  postgres0059f: # prod grant remains until promote
    command: ../openrun binding run-command /apps/b1stage "select count(*) as n from test1" | jq -r '.rows[0].n'
    stdout: "1"

  postgres0059g:
    command: ../openrun binding update --promote /apps/b1stage
    stdout: "Binding /apps/b1stage updated"

  postgres0059h:
    command: ../openrun binding run-command /apps/b1stage "select count(*) as n from test1"
    stderr: "permission denied for table test1"
    exit-code: 1

  postgres0060:
    command: ../openrun binding create --grant "full:*" /apps/b1 /apps/b1full
    stdout: "Binding /apps/b1full created"

  postgres0061:
    command: ../openrun binding run-command /apps/b1full "select count(*) as n from test1" | jq -r '.rows[0].n'
    stdout: "1"

  postgres0062:
    command: ../openrun binding run-command /apps/b1full "insert into test1 (id, note) values (4, 'full')"
    stdout: '"rows_affected": 1'

  postgres0063:
    command: ../openrun binding run-command /apps/b1full "create table full_created (id integer)"
    stdout: '"command_tag": "CREATE TABLE"'

  postgres0064:
    command: ../openrun binding run-command /apps/b1 "select count(*) as n from test1" | jq -r '.rows[0].n'
    stdout: "2"

  postgres0065: # default privileges from full:* cover future tables and sequences
    command: ../openrun binding run-command /apps/b1 "create table test3 (id integer generated always as identity primary key, note text)"
    stdout: '"command_tag": "CREATE TABLE"'

  postgres0066:
    command: ../openrun binding run-command /apps/b1full "insert into test3 (note) values ('future full')"
    stdout: '"rows_affected": 1'

  postgres0067:
    command: ../openrun binding run-command /apps/b1full "select count(*) as n from test3" | jq -r '.rows[0].n'
    stdout: "1"

  postgres0068: # full grant can target one specific table
    command: ../openrun binding create --grant "full:test1" /apps/b1 /apps/b1fulltest1
    stdout: "Binding /apps/b1fulltest1 created"

  postgres0068a:
    command: ../openrun binding run-command /apps/b1fulltest1 "select count(*) as n from test1" | jq -r '.rows[0].n'
    stdout: "2"

  postgres0068b:
    command: ../openrun binding run-command /apps/b1fulltest1 "insert into test1 (id, note) values (5, 'full table')"
    stdout: '"rows_affected": 1'

  postgres0068c: # table-specific full grant does not include other tables
    command: ../openrun binding run-command /apps/b1fulltest1 "select count(*) as n from test2"
    stderr: "permission denied for table test2"
    exit-code: 1

  postgres0068d: # table-specific full grant does not include schema create
    command: ../openrun binding run-command /apps/b1fulltest1 "create table full_table_created (id integer)"
    stderr: "permission denied for schema"
    exit-code: 1

  postgres0069: # multiple grants can be applied in one update
    command: ../openrun binding create /apps/b1 /apps/b1multi
    stdout: "Binding /apps/b1multi created"

  postgres0069a:
    command: ../openrun binding update --add-grant "read:test1" --add-grant "create:*" --promote /apps/b1multi
    stdout: "Binding /apps/b1multi updated"

  postgres0069b:
    command: ../openrun binding run-command /apps/b1multi "select count(*) as n from test1" | jq -r '.rows[0].n'
    stdout: "3"

  postgres0069c:
    command: ../openrun binding run-command /apps/b1multi "create table multi_created (id integer)"
    stdout: '"command_tag": "CREATE TABLE"'

  postgres0069d:
    command: ../openrun binding update --delete-grant "read:test1" --add-grant "read:test2" --promote /apps/b1multi
    stdout: "Binding /apps/b1multi updated"

  postgres0069e: # deleted grant was revoked
    command: ../openrun binding run-command /apps/b1multi "select count(*) as n from test1"
    stderr: "permission denied for table test1"
    exit-code: 1

  postgres0069f: # added grant was applied
    command: ../openrun binding run-command /apps/b1multi "select count(*) as n from test2" | jq -r '.rows[0].n'
    stdout: "1"

  postgres0069g: # untouched create grant remains
    command: ../openrun binding run-command /apps/b1multi "create table multi_created_after_update (id integer)"
    stdout: '"command_tag": "CREATE TABLE"'

  postgres0070: # revoke read:* from existing tables
    command: ../openrun binding update --delete-grant "read:*" --promote /apps/b1read
    stdout: "Binding /apps/b1read updated"

  postgres0071:
    command: ../openrun binding run-command /apps/b1read "select count(*) as n from test1"
    stderr: "permission denied for table test1"
    exit-code: 1

  postgres0072:
    command: ../openrun binding run-command /apps/b1read "select count(*) as n from test2"
    stderr: "permission denied for table test2"
    exit-code: 1

  postgres0073: # revoke read:* also removes default privileges for future tables
    command: ../openrun binding run-command /apps/b1 "create table test_after_read_revoke (id integer primary key)"
    stdout: '"command_tag": "CREATE TABLE"'

  postgres0074:
    command: ../openrun binding run-command /apps/b1read "select count(*) as n from test_after_read_revoke"
    stderr: "permission denied for table test_after_read_revoke"
    exit-code: 1

  postgres0080: # revoke create:* removes schema create privilege
    command: ../openrun binding update --delete-grant "create:*" --promote /apps/b1create
    stdout: "Binding /apps/b1create updated"

  postgres0081:
    command: ../openrun binding run-command /apps/b1create "create table create_after_revoke (id integer)"
    stderr: "permission denied for schema"
    exit-code: 1

  postgres0090: # revoke full:* removes table write/read and schema create privileges
    command: ../openrun binding update --delete-grant "full:*" --promote /apps/b1full
    stdout: "Binding /apps/b1full updated"

  postgres0091:
    command: ../openrun binding run-command /apps/b1full "insert into test1 (id, note) values (5, 'full revoked')"
    stderr: "permission denied for table test1"
    exit-code: 1

  postgres0092:
    command: ../openrun binding run-command /apps/b1full "select count(*) as n from test1"
    stderr: "permission denied for table test1"
    exit-code: 1

  postgres0093:
    command: ../openrun binding run-command /apps/b1full "create table full_after_revoke (id integer)"
    stderr: "permission denied for schema"
    exit-code: 1

  postgres9999:
    command: (../openrun app delete /pg_verify_app; ../openrun binding delete /apps/bverify; ../openrun binding delete /apps/b1multi; ../openrun binding delete /apps/b1fulltest1; ../openrun binding delete /apps/b1full; ../openrun binding delete /apps/b1stage; ../openrun binding delete /apps/b1create; ../openrun binding delete /apps/b1read; ../openrun binding delete /apps/b1partialread; ../openrun binding delete /apps/b1; ../openrun service delete postgres/pg1; rm -rf ./pg_verifyapp ./pg_verify.star ./pg_failapp ./pg_failverify.star) || true
