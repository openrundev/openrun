config:
  env:
    CL_CONFIG_FILE: openrun.toml
    # commander replaces the process environment with this map; OPENRUN_HOME
    # anchors the CLI's socket/config resolution to the tests dir, and
    # PATH/HOME are needed for kubectl (binary lookup + kubeconfig)
    OPENRUN_HOME: .
    PATH: ${PATH}
    HOME: ${HOME}
    HTTP_PORT: ${HTTP_PORT}
    GOCOVERDIR: ${GOCOVERDIR}/../client
    KUBE_BINDING_IMAGE: ${KUBE_BINDING_IMAGE}
    KUBE_TEST_NAMESPACE: ${KUBE_TEST_NAMESPACE}
tests:
  kubernetes010: # setup flask app
    command: rm -rf ./flaskapp && mkdir flaskapp && cp flask.py flaskapp/app.py
  kubernetes030: # setup flask prod app
    command: ../openrun app create --stage-at path --spec python-flask --carg PYTHON_VERSION='{{secret_from "env" "PYTHON_VERSION"}}' --copt cpus=0.05 --copt memory=0.5g --approve ./flaskapp /kube_flaskprod
  kubernetes031:
    command: curl -sS localhost:${HTTP_PORT}/kube_flaskprod
  kubernetes032: # check curl
    command: curl -sS localhost:${HTTP_PORT}/kube_flaskprod
    stdout: hello
  kubernetes050: # update app code
    command: perl -i -pe 's/"hello"/"updated"/g' flaskapp/app.py
  kubernetes070: # stage is not yet updated
    command: curl -sS localhost:${HTTP_PORT}/kube_flaskprod_cl_stage
    stdout: "hello"
  kubernetes080: # do reload
    command: ../openrun app reload /kube_flaskprod
  kubernetes081:
    command: curl -sS localhost:${HTTP_PORT}/kube_flaskprod_cl_stage
  kubernetes090: # stage is updated
    command: curl -sS localhost:${HTTP_PORT}/kube_flaskprod_cl_stage
    stdout: "updated"
  kubernetes100: # prod is not yet updated
    command: curl -sS localhost:${HTTP_PORT}/kube_flaskprod
    stdout: "hello"
  kubernetes110: # do promote
    command: ../openrun app promote /kube_flaskprod
  kubernetes120: # prod is updated
    command: curl -sS localhost:${HTTP_PORT}/kube_flaskprod
    stdout: "updated"

  kubernetes200: # setup streamlit app
    command: ../openrun app create --stage-at path --spec python-streamlit --branch master --approve --copt cpus=0.05 --copt kubernetes.memory=300m --copt max_replicas=2 github.com/streamlit/streamlit-example /kube_streamlit
  kubernetes210: # check stage
    command: curl -sS localhost:${HTTP_PORT}/kube_streamlit_cl_stage/_stcore/health
    stdout: ok
  kubernetes220: # check prod
    command: curl -sS localhost:${HTTP_PORT}/kube_streamlit/_stcore/health
    stdout: ok

  kubernetes400: # setup nginx image
    command: ../openrun app create --stage-at path --spec image --approve --param image=nginx --param port=80 - /kube_image_nginx
  kubernetes410: # check stage
    command: curl -sS localhost:${HTTP_PORT}/kube_image_nginx_cl_stage
    stdout: Welcome to nginx
  kubernetes420: # check prod
    command: curl -sS localhost:${HTTP_PORT}/kube_image_nginx
    stdout: Welcome to nginx
  kubernetes430: # error check
    command: ../openrun app create --spec image --approve --param image=nginx - /kube_image_error
    stderr: param port is a required param, a value has to be provided
    exit-code: 1

  # Test http plugin call without proxy
  kubernetes500: # setup app
    command: ../openrun app create --spec python-flask --approve --param PASSWD=xyz ./flaskhttp /kube_fh
  kubernetes510: # check curl
    command: curl -sS localhost:${HTTP_PORT}/kube_fh
    stdout: '"v1":"hello"'
  kubernetes520: # check curl
    command: curl -sS localhost:${HTTP_PORT}/kube_fh
    stdout: '"v2":"xyz"'

  # Test go spec
  kubernetes600: # setup app
    command: ../openrun app create --approve --spec go --param port=8080 --param APP_ARGS="-addr 0.0.0.0:8080" --branch master github.com/golang/example/helloserver /kube_goapp
  kubernetes610: # check curl
    command: curl -sS localhost:${HTTP_PORT}/kube_goapp
    stdout: "Hello, Gopher!"

  # Test volumes
  kubernetes700: # setup flask app
    command: rm -rf ./sqlite_tmp && cp -rf sqlite sqlite_tmp
  kubernetes701: # setup app
    command: ../openrun app create --approve --spec python-flask -cvol aaa:/tmp/data ./sqlite_tmp /kube_sql
  kubernetes702: # check version
    command: curl -sS localhost:${HTTP_PORT}/kube_sql/version
    stdout: "VERSION1"
  kubernetes703: # update val
    command: |
      curl -X POST "localhost:${HTTP_PORT}/kube_sql/value" -H "Content-Type: application/json" -d '{"value": "testval1"}'
  kubernetes704: # check val
    command: curl -sS localhost:${HTTP_PORT}/kube_sql/value
    stdout: "testval1"
  kubernetes705: # update app code
    command: perl -i -pe 's/"VERSION1"/"VERSION2"/g' sqlite_tmp/app.py
  kubernetes706: # reload
    command: ../openrun app reload --promote /kube_sql
  kubernetes707: # check version is updated
    command: curl -sS localhost:${HTTP_PORT}/kube_sql/version
    stdout: "VERSION2"
  kubernetes708: # check new val is retained after reload (mount was used)
    command: curl -sS localhost:${HTTP_PORT}/kube_sql/value
    stdout: "testval1"

  # Test app reload --verify: a passing reload updates the app, a failing one
  # (health check returns 500) is rolled back and the old version keeps serving.
  kubernetes800: # setup verify test app (no volume)
    command: rm -rf ./verifyapp_tmp && cp -rf verifyapp verifyapp_tmp
  kubernetes801: # create app
    command: ../openrun app create --stage-at path --spec python-flask --approve ./verifyapp_tmp /kube_verify
  kubernetes802: # check initial version
    command: curl -sS localhost:${HTTP_PORT}/kube_verify/version
    stdout: "V1"
  kubernetes810: # update app code to a valid new version
    command: perl -i -pe 's/"V1"/"V2"/g' verifyapp_tmp/app.py
  kubernetes811: # reload --verify succeeds
    command: ../openrun app reload --verify --promote /kube_verify
    exit-code: 0
  kubernetes812: # version is updated
    command: curl -sS localhost:${HTTP_PORT}/kube_verify/version
    stdout: "V2"
  kubernetes820: # break the health endpoint (returns 500) and bump version
    command: perl -i -pe 's/return "ok", 200/return "broken", 500/g; s/"V2"/"V3"/g' verifyapp_tmp/app.py
  kubernetes821: # reload --verify fails health and is reverted
    command: ../openrun app reload --verify --promote /kube_verify
    exit-code: 1
    stderr: "verify failed"
  kubernetes822: # version is unchanged (rolled back, old version kept serving)
    command: curl -sS localhost:${HTTP_PORT}/kube_verify/version
    stdout: "V2"
  kubernetes823: # health endpoint still serves the old, working version
    command: curl -sS localhost:${HTTP_PORT}/kube_verify
    stdout: "ok"

  # Out-of-process binding providers, OCI distribution path: the harness built
  # the fixture provider into bindings.preinstalled_dir (as the Helm chart's
  # init containers populate the shared volume) and pushed it as a FROM
  # scratch image to the test registry.
  kubernetes900: # preinstalled provider is registered: its service type works
    command: ../openrun service create --config url=fixture://kube fixture/kfx1
    stdout: "Service fixture/kfx1 created"
  kubernetes901: # binding create goes through the preinstalled provider
    command: ../openrun binding create fixture/kfx1 /kube_fx1
    stdout: "Binding /kube_fx1 created"
  kubernetes902: # run-command round trip through the provider process
    command: ../openrun binding run-command /kube_fx1 "echo:oci-ok" | jq -r '.echo'
    stdout: "oci-ok"
  kubernetes903: # disable_install rejects imperative provider install
    command: ../openrun provider install fixture --version v0.1.0
    stderr: "provider install is disabled"
    exit-code: 1
  kubernetes904: # disable_install rejects imperative provider uninstall
    command: ../openrun provider uninstall fixture
    stderr: "provider uninstall is disabled"
    exit-code: 1
  kubernetes910: # in-cluster export: init container copies the provider out of the scratch image
    command: |
      kubectl apply -n ${KUBE_TEST_NAMESPACE} -f - <<EOF
      apiVersion: v1
      kind: Pod
      metadata:
        name: binding-export-test
      spec:
        restartPolicy: Never
        initContainers:
          - name: binding-provider-fixture
            image: ${KUBE_BINDING_IMAGE}
            command: ["/openrun-binding-fixture", "export", "/providers"]
            volumeMounts:
              - name: providers
                mountPath: /providers
        containers:
          - name: check
            image: busybox:1.36
            command: ["sh", "-c", "test -x /providers/openrun-binding-fixture && echo EXPORT_OK"]
            volumeMounts:
              - name: providers
                mountPath: /providers
        volumes:
          - name: providers
            emptyDir: {}
      EOF
    stdout: "pod/binding-export-test created"
  kubernetes911: # exported binary is present and executable in the shared volume
    command: kubectl wait -n ${KUBE_TEST_NAMESPACE} --for=jsonpath='{.status.phase}'=Succeeded pod/binding-export-test --timeout=120s && kubectl logs -n ${KUBE_TEST_NAMESPACE} binding-export-test -c check
    stdout: "EXPORT_OK"
  kubernetes912: # init container logged the export
    command: kubectl logs -n ${KUBE_TEST_NAMESPACE} binding-export-test -c binding-provider-fixture
    stdout: "exported /providers/openrun-binding-fixture"
  kubernetes913: # cleanup export test pod
    command: kubectl delete pod binding-export-test -n ${KUBE_TEST_NAMESPACE} --ignore-not-found
  kubernetes920: # binding delete through the provider
    command: ../openrun binding delete /kube_fx1
    stdout: "Binding /kube_fx1 deleted"
  kubernetes921: # service delete
    command: ../openrun service delete fixture/kfx1
    stdout: "Service fixture/kfx1 deleted"
