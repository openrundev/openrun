# The default configuration used by the OpenRun server and client

server_uri = "$OPENRUN_HOME/run/openrun.sock" # the unix domain socket (UDS) path or URL to the OpenRun server
admin_user = "admin"

# Properties use by the OpenRun client to connect to the server
[client]
admin_password = ""      # the password for the admin user. Required only if admin over TCP is enabled
skip_cert_check = false
default_format = "basic" # default output format for the client commands

# HTTP port binding related Config
[http]
host = "127.0.0.1"        # bind to localhost by default for HTTP
port = 25222              # default port for HTTP
redirect_to_https = false # redirect HTTP to HTTPS

# HTTPS port binding related Config
[https]
host = "0.0.0.0"                               # bind to all interfaces (if port is >= 0)
port = 25223                                   # port for HTTPS
enable_cert_lookup = true                      # enable looking for certificate files on disk before using Let's Encrypt
mkcert_path = ""                               # mkcert binary path, set to disable to disable mkcert
service_email = ""                             # email address for registering with Let's Encrypt. Set a value to enable automatic certs
use_staging = true                             # use Let's Encrypt staging server
cert_location = "$OPENRUN_HOME/config/certificates" # where to look for existing certificate files
storage_location = "$OPENRUN_HOME/run/certmagic"    # where to cache dynamically created certificates
disable_client_certs = true                    # disable client certs for HTTPS

[security]
unsafe_admin_over_tcp = false    # enable admin API's over TCP (HTTP/HTTPS). Admin is over UDS only by default.
                                 # It is strongly recommended to keep this setting disabled (false).
admin_password_bcrypt = ""       # the password bcrypt value
session_secret = ""              # the secret key for session cookie. Auto generated on server startup if not set
session_block_key = ""           # the block key for session cookie. Auto generated on server startup if not set
session_max_age = 86400          # session max age in seconds
session_https_only = true        # session cookie is HTTPS only
trusted_proxies = []             # CIDR ranges or IPs allowed to supply forwarded client IP headers
app_default_auth_type = "none" # default auth type for apps, "system" or "none" or custom auth
auth_required = false          # require authentication for all apps. This is verified during app access, not during metadata updates
                               # If this is set to true, the app access will be denied if the app is not authenticated.
                               # "none" auth_type cannot be used if this is set to true.
default_git_auth = ""            # default git auth entry to use
stage_enable_write_access = true # enable write plugin API call access for staging apps
preview_enable_write_access = true #  enable write plugin API call access for preview apps
allowed_container_args = { add-host = "regex:.*" } # the container args that are allowed to be used in the app config
                                 # keys are the container arg names, values are the allowed values
                                 # empty values allow valueless flags only
                                 # non-empty values must match exactly, or can use regex:.* to allow all values
allowed_mounts = ["$OPENRUN_HOME/mounts"] # host paths that app volume sources are allowed to mount
unsafe_agent_without_sandbox = false # run app builder agents directly on the host instead of inside a container sandbox.
                                 # NOT RECOMMENDED: the sandbox is the safety boundary for the agent's auto-approved
                                 # tool calls; without it the agent runs with full access as the server user.
                                 # Dev-only escape hatch, e.g. to let codex use the host's ChatGPT login (no API key).
                                 # The agent command must be installed on the host; config_files mounts are ignored.
unsafe_enable_testurl_rbac = false      # allow _cl_perm= and _cl_role= URL path directives on dev mode apps
                                 # with none auth, simulating RBAC permissions/roles for testing
unsafe_allow_system_plugins_anon = false # allow anonymous (unauthenticated) callers to use the privileged system
                                 # plugins (openrun_admin, build). By default these require an authenticated user
                                 # regardless of RBAC, so a console served with none auth cannot run admin/builder
                                 # operations. The read-only openrun plugin is never gated. Dev-only escape hatch.

# Logging related Config
[logging]
level = "INFO"
max_backups = 10
max_size_mb = 50
console = false
file = true
access_logging = true

# OpenTelemetry related Config. Disabled by default.
# When enabled, endpoint and headers are optional; the standard OTEL_EXPORTER_OTLP_*
# environment variables are used by the OpenTelemetry exporters when these are unset.
# Header values support {{ secret ... }} references and are resolved before being sent
# to the exporter.
[telemetry]
enabled = false
service_name = ""
environment = ""
endpoint = ""
headers = {}
traces = true
metrics = true
plugin_spans = false # create a span around each Starlark plugin invocation; can be expensive

# Metadata Storage Config
[metadata]
db_connection = "sqlite:$OPENRUN_HOME/metadata/clace_metadata.db"
auto_upgrade = true
audit_db_connection = "sqlite:$OPENRUN_HOME/metadata/clace_audit.db"
file_cache_connection = "sqlite:$OPENRUN_HOME/metadata/file_cache.db"
config_history_versions = 20    # number of dynamic config snapshots retained

[system]
tailwindcss_command = "tailwindcss"
tailwind_version = 4 # 3 uses legacy Tailwind 3/daisyUI 4 config, 4 uses Tailwind 4/daisyUI 5 CSS config
# prebundled daisyui plugins (tailwind_version 4), downloaded into the app work dir so no node_modules setup is needed
daisyui_url = "https://github.com/saadeghi/daisyui/releases/download/v5.6.10/daisyui.js"
daisyui_theme_url = "https://github.com/saadeghi/daisyui/releases/download/v5.6.10/daisyui-theme.js" # used for style custom_themes
file_watcher_debounce_millis = 300
watch_ignore_patterns = ["**/.vscode/**", "**/.idea/**", "**/.git/**", "**/.DS_Store/**", "**/.*sw*"] # patterns to ignore for file watcher
node_path = ""                      # node module lookup paths https://esbuild.github.io/api/#node-paths
container_command = "auto"          # "auto" or "docker" or "podman" or "kubernetes"
stale_container_cleanup_interval_mins = 5 # stop stale OpenRun containers every N minutes for Docker/Podman. Set <= 0 to disable.
default_domain = "localhost"        # default domain for apps
stage_at = "domain"                 # "domain", "path", or a domain for staging apps
default_stage_domain = "stage"      # domain prefix for staging apps when stage_at is "domain"
root_serve_list_apps = "auto"       # "auto" means serve list_apps app for default domain, "disable" means don't server for any domain,
                                    # any other value means serve for specified domain
enable_compression = true           # enable compression for HTTP responses
default_schedule_mins = 15          # default sync schedule interval in minutes
max_sync_failure_count = 5          # max number of sync failures before sync is marked as disabled
early_hints = false                 # enable early hints for HTML responses

http_event_retention_days = 90      # number of days to retain http events
non_http_event_retention_days = 180 # number of days to retain non-http (system, action, custom) events
allowed_env = ["HOME", "OPENRUN_HOME", "PATH"] # env values allowed for use in node config

max_concurrent_builds = 1 # max number of concurrent container builds
max_build_wait_secs = 120 # max wait time for a build lock
use_image_pre_build_step = true # for verified reloads, build container images before the metadata transaction starts
file_workers = 4 # number of parallel workers for file compression during app version creation

leader_election_lease_secs = 30 # duration of the leader election lease
leader_election_heartbeat_interval_secs = 10 # interval at which the leader heartbeat is sent

list_apps_title = "OpenRun Apps" # the title of the list apps page
show_hosted_with = true            # whether to show "Hosted with OpenRun" in the list apps page
fallback_unknown_domains = false    # whether to fallback to default domain for unknown domains
forward_auth_timeout_secs = 30      # timeout in seconds for forward auth requests

[kubernetes]
namespace = "openrun"
use_node_port = false

[builder]
mode = "auto" # "auto" or "kaniko" or "command" or "delegate:<url>" or "delegate_server"
kaniko_image = "ghcr.io/kaniko-build/dist/chainguard-dev-kaniko/executor:v1.25.3-slim"
kaniko_cache = true    # cache build layers in the registry, reused across builds
kaniko_cache_repo = "" # defaults to <registry_url>[/<project>]/kaniko-cache

# Embedded secrets store: values are AES-256-GCM encrypted and saved in the metadata database.
# Values are stored with "openrun secret create"; use {{secret_from "db" "<name>"}} to reference them.
[secret.db]
key = "auto" # "auto" generates the master key into $OPENRUN_HOME/config/secret.key on first use.
             # Can instead be a {{secret ...}}/{{secret_from ...}} reference resolved through another
             # provider (env/vault/asm/ssm/kubernetes/properties), for example on Kubernetes:
             #   key = '{{secret_from "env" "OPENRUN_SECRET_KEY"}}'
             # Key material format: one or more "<key_id>:<base64 32 byte key>" entries separated by
             # newlines or commas; the first entry is used for new writes, all entries can decrypt.

[plugin."store.in"]
db_connection = "sqlite:$OPENRUN_HOME/metadata/clace_app_store.db"

[plugin."fs.in"]
db_connection = "sqlite:$OPENRUN_HOME/metadata/clace_fs.db"

[permissions]
binding_source_perms = ["postgres", "mysql"] # default postgres and mysql binding sources are allowed by default

[[permissions.allow]]
plugin = "proxy.in"
method = "config"
arguments = ["<CONTAINER_URL>"]

[[permissions.allow]]
plugin = "container.in"
method = "config"
arguments = ["regex:.*"]
secrets = [] # no secrets allowed by default, use [["regex:.*"]] to allow all secrets
             # to be accessed by apps which are using the container plugin

[[permissions.allow]]
plugin = "http.in"
method = "regex:.*"
# Only auto-allow http calls to the app's own container (<CONTAINER_URL>...),
# so a Starlark frontend can call its own backend without approval. The regex
# is anchored (^) - the matcher is unanchored, so without ^ an app could embed
# <CONTAINER_URL> in an external url to bypass this. Calls to any other host
# fall back to requiring an approved http permission. Use "regex:.*" to allow
# all outbound http (opens an SSRF surface), or list specific hosts with
# arguments = ["regex:^https://api\\.example\\.com/.*"].
arguments = ["regex:^<CONTAINER_URL>"]
secrets = [] # no secrets allowed by default, use [["regex:.*"]] to allow all secrets
             # to be accessed by apps which are using the http plugin

# Disallow exec plugin by default, since it can be used to run arbitrary commands on the host.
[[permissions.disallow]]
plugin = "exec.in"

[app_config]
# app config can be set at the app level using a metadata config update. For example:
#  openrun app update conf --promote 'cors.allow_methods="GET, POST"' /myapp

# Action related settings
action.max_request_body_bytes = 33554432

# ==== CORS related Config ====
# CORS is disabled by default. Containerized apps are normally accessed through
# OpenRun, which handles auth before proxying requests to the app.
# If cors.allow_origin is set to empty string, no CORS headers are set.
# If allow_origin is set to "origin", the origin host is used as the allow_origin header.
# For any other value for cors.allow_origin, the specified value is used as the allow_origin header.
cors.allow_origin = ""
cors.allow_methods = "*"
cors.allow_headers = "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Requested-With"
cors.allow_credentials = "false"
cors.max_age = "2678400"                                                                                                                 # 31 days

# ==== Container related Config ====

# Health check Config
container.health_url = "/"
container.health_attempts_after_startup = 30
container.health_timeout_secs = 5
container.deploy_probe_period_secs = 1
container.deploy_health_attempts = 75
container.deploy_progress_deadline_secs = 0 # 0 lets OpenRun choose a safe Kubernetes rollout deadline; tests may lower this to fail broken rollouts faster

# Idle Shutdown Config
container.idle_shutdown_secs = 180
container.idle_shutdown_dev_apps = false
container.idle_bytes_high_watermark = 1500 # bytes high watermark for idle shutdown 
                                           # (1500 bytes sent and recv over 180 seconds)

# Status check Config
container.status_check_interval_secs = 20
container.status_health_attempts = 10

# Show logs for container startup failures in prod mode (dev is always true)
container.log_lines_to_show = 1000
container.show_logs_for_failure = true

# Kubernetes related settings
kubernetes.default_volume_size = "10Gi"
kubernetes.scaling_threshold_cpu = 80

# Proxy related settings
proxy.max_idle_conns = 250
proxy.idle_conn_timeout_secs = 15
proxy.disable_compression = true
proxy.rewrite_location = true

# FS plugin related settings
fs.file_access = ["$TEMPDIR", "/tmp"]
fs.retain_versions = 5 # number of older versions to keep for each app

# Audit related settings
audit.redact_url = false
audit.skip_http_events = false

security.default_secrets_provider = "env" # default secret provider, env if it is enabled
security.disable_csrf_protection = false # disable CSRF protection for apps
# Level of security related HTTP response headers added to app responses. Value from 0 to 10:
# 0 = no extra headers, 2 = baseline safe headers, 5 = stricter headers incl. HSTS,
# 10 = full strict set incl. Content-Security-Policy. Only 0, 2, 5 and 10 are implemented;
# other values round down to the nearest implemented level.
security.headers_level = 2

[app_builder]
enabled = false                 # AI app builder (console Builder tab); not supported with the Kubernetes container backend
preview_path = "/builder/preview" # mount prefix for draft preview apps
default_agent = "opencode"      # [builder_agent.*] entry to use
max_sessions = 5                # concurrent live agent sandboxes
session_idle_mins = 120         # stop the agent sandbox after idle
workspace_dir = ""              # default $OPENRUN_HOME/run/builder
system_prompt = ""              # replaces the embedded base prompt when set
prompt_extra = ""               # admin text appended to the system prompt
default_git_config = ""         # [builder_git.*] entry used when the prompt preset picks none; empty publishes locally ($OPENRUN_HOME/app_src)

# Publish destinations for builder apps: [builder_publish.<name>] entries with
# an app path glob and a description of the RBAC rules that apply there. No
# entries means any path is allowed (RBAC still gates who can publish where).
# Agent profiles are [builder_agent.<name>] entries; the agent type comes from
# the name (opencode, opencode_dev, pi, ... or custom_<name> with dockerfile
# and command set). model/effort in a profile are passed to the agent at
# session start (ACP config options when advertised, plus
# OPENRUN_AGENT_MODEL/OPENRUN_AGENT_EFFORT env in the sandbox).
# Git publish destinations are [builder_git.<name>] entries (repo, branch,
# auth, apps_file, source_dir; defaults main/apps.star/apps). A
# [builder_prompt.*] preset picks one with git_config, else
# app_builder.default_git_config applies, else publish is local mode
